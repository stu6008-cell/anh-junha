            leaveChannel();
            PVP.code = code; PVP.myIndex = idx; PVP.status = 'waiting'; PVP.started = false;
            const sb = sbClient(); if (!sb) { alert('실시간 서버 준비 안됨'); return; }
            const ch = sb.channel('pvp-' + code, { config: { broadcast: { self: false }, presence: { key: String(idx) } } });
            ch.on('broadcast', { event: 'state' }, ({ payload }) => onOppState(payload));
            ch.on('broadcast', { event: 'shot' }, ({ payload }) => onOppShot(payload));
            ch.on('broadcast', { event: 'burst' }, ({ payload }) => onBurst(payload));
            ch.on('broadcast', { event: 'dead' }, () => onOppDead());
            ch.on('broadcast', { event: 'left' }, () => onOppLeft());
            ch.on('presence', { event: 'sync' }, () => maybeStart());
            ch.on('presence', { event: 'leave' }, () => onOppLeft());
            ch.subscribe((status) => { if (status === 'SUBSCRIBED') { ch.track({ idx }); maybeStart(); } });
            PVP.channel = ch;
            pvpUI();
        }
        function maybeStart() {
            if (PVP.status !== 'waiting' || PVP.started || !PVP.channel) return;
            const n = Object.keys(PVP.channel.presenceState()).length;
            if (n >= 2) startMatch();
        }

        // === 상대 이벤트 ===
        function onOppState(p) {
            const o = PVP.opp; if (!o || !p) return;
            o.tx = p.x; o.ty = p.y; o.hp = p.hp;
            if (p.mh) o.maxHp = p.mh;
            o.dead = !!p.dead;
            if (p.name) o.name = p.name;
            if (p.job && o.job !== p.job) { o.job = p.job; o.sprites = pvpLoadJobSprite(p.job); }
            if (o.dead && PVP.status === 'playing') endMatch(PVP.myIndex);
        }
        function onOppShot(p) {
            if (!p) return;
            PVP.shots.push({ owner: 1 - PVP.myIndex, x: p.x, y: p.y, vx: p.vx, vy: p.vy, dmg: p.dmg, r: p.r || SHOT_R, color: p.color || '#ff8a5a', skill: !!p.skill, name: p.name || '' });
        }
        function onOppDead() { if (PVP.status === 'playing') endMatch(PVP.myIndex); }
        function onOppLeft() { if (PVP.status === 'playing') endMatch(PVP.myIndex, true); }

        // === 매치 시작 ===
        function startMatch() {
            if (PVP.started) return;
            PVP.started = true; PVP.status = 'playing';
            const snap = pvpSnapshotLite();
            const left = PVP.myIndex === 0;
            PVP.me = Object.assign({}, snap, {
                x: left ? 70 : ARENA_W - 70, y: ARENA_H / 2,
                hp: snap.maxHp, mana: snap.maxMana, dead: false, cd: {},
                sprites: game.character.images   // 내 스프라이트(이미 로드됨)
            });
            PVP.opp = {
                name: '상대', job: null, sprites: null,
                x: left ? ARENA_W - 70 : 70, y: ARENA_H / 2,
                tx: left ? ARENA_W - 70 : 70, ty: ARENA_H / 2,
                hp: 1, maxHp: 1, dead: false
            };
            PVP.shots = []; PVP.bursts = []; PVP.lastSend = 0; PVP.lastBasic = 0; PVP.lastTs = 0; PVP.winner = null; PVP.leftFlag = false;
            buildArena();
            sendState(true);
            PVP.raf = requestAnimationFrame(pvpFrame);
        }
        function buildArena() {
            const body = document.getElementById('pvpBody'); if (!body) return;
            body.innerHTML = closeBtn() +
                `<h2 style="font-size:18px;margin-bottom:2px">⚔️ 실시간 대결</h2>
                 <canvas id="pvpArena" width="${ARENA_W}" height="${ARENA_H}"></canvas>
                 <div class="pvp-hint">좌우 이동 <b>A / D</b> (← →) · 기본공격 <b>스페이스</b>(자동조준) · 스킬 <b>1~4</b><br>먼저 상대 체력을 0으로 만들면 승리!</div>`;
            PVP.canvas = document.getElementById('pvpArena');
            PVP.ctx = PVP.canvas.getContext('2d');
            // 클릭/터치로도 기본공격
            PVP.canvas.onpointerdown = () => {
                const now = performance.now();
                if (PVP.me && !PVP.me.dead && now - PVP.lastBasic > BASIC_CD) { PVP.lastBasic = now; fire(PVP.me.atk, '#9fe3ff', BASIC_R); }
            };
        }

        function endMatch(winnerIdx, leftFlag) {
            if (PVP.status === 'done') return;
            PVP.status = 'done'; PVP.winner = winnerIdx; PVP.leftFlag = !!leftFlag;
            if (PVP.raf) { cancelAnimationFrame(PVP.raf); PVP.raf = null; }
            renderResult();
        }
        function sendState() {
            const m = PVP.me; if (!m) return;
            chSend('state', { x: Math.round(m.x), y: Math.round(m.y), hp: Math.round(m.hp), mh: m.maxHp, dead: m.dead, name: m.name, job: m.job });
        }
        function fire(dmg, color, r, name) {
            const m = PVP.me, o = PVP.opp;
            if (!m || m.dead || !o) return;
            const skill = !!name;
            let dx = o.x - m.x, dy = o.y - m.y; const d = Math.hypot(dx, dy) || 1; dx /= d; dy /= d;
            const sh = { owner: PVP.myIndex, x: m.x + dx * (PLAYER_R + 4), y: m.y + dy * (PLAYER_R + 4), vx: dx * SHOT_SPEED, vy: dy * SHOT_SPEED, dmg, r: r || SHOT_R, color, skill, name: name || '' };
            PVP.shots.push(sh);
            chSend('shot', { x: sh.x, y: sh.y, vx: sh.vx, vy: sh.vy, dmg, r: sh.r, color, skill, name: sh.name });
        }
        // 스킬 폭발 이펙트 (메인 게임과 같은 빛나는 방사형)
        function pvpBurst(x, y, color, big) {
            const L = big ? 20 : 12;
            PVP.bursts.push({ x, y, color: color || '#fff', r: 0, maxR: big ? 64 : 26, life: L, maxLife: L });
        }
        function onBurst(p) { if (p) pvpBurst(p.x, p.y, p.color, p.big); }

        // === 메인 루프 ===
        function pvpFrame(ts) {
            if (!PVP.open || PVP.status !== 'playing') return;
            if (!PVP.lastTs) PVP.lastTs = ts;
            let dt = ts - PVP.lastTs; PVP.lastTs = ts; if (dt > 50) dt = 50;
            const f = dt / 16.67;
            const m = PVP.me, o = PVP.opp;

            if (!m.dead) {
                let dx = 0;
                if (keys['a'] || keys['arrowleft']) dx -= 1;
                if (keys['d'] || keys['arrowright']) dx += 1;
                if (dx) m.x += dx * MOVE_SPEED * f;   // 좌우만 이동 (위아래 X)
                m.x = Math.max(PLAYER_R, Math.min(ARENA_W - PLAYER_R, m.x));
                if (keys[' '] && ts - PVP.lastBasic > BASIC_CD) { PVP.lastBasic = ts; fire(m.atk, '#9fe3ff', BASIC_R); }
                m.skills.forEach((s, i) => {
                    if (keys[String(i + 1)]) {
                        const ready = (m.cd[s.key] || 0) <= ts;
                        if (ready && m.mana >= s.mana) { m.mana -= s.mana; m.cd[s.key] = ts + s.cd * 1000; fire(m.atk * s.mult, s.color || '#ffd166', SHOT_R + 4, s.name); }
                    }
                });
            }
            m.mana = Math.min(m.maxMana, m.mana + m.maxMana * (dt / MANA_FULL_MS));
            if (o) { const k = Math.min(1, 0.25 * f); o.x += (o.tx - o.x) * k; o.y += (o.ty - o.y) * k; }

            for (let i = PVP.shots.length - 1; i >= 0; i--) {
                const sh = PVP.shots[i]; sh.x += sh.vx * f; sh.y += sh.vy * f;
                if (sh.x < -20 || sh.x > ARENA_W + 20 || sh.y < -20 || sh.y > ARENA_H + 20) { PVP.shots.splice(i, 1); continue; }
                if (sh.owner !== PVP.myIndex && !m.dead && Math.hypot(sh.x - m.x, sh.y - m.y) < sh.r + PLAYER_R) {
                    const dmg = Math.max(Math.round(sh.dmg * 0.1), Math.round(sh.dmg - m.def));
                    m.hp -= dmg; PVP.shots.splice(i, 1);
                    pvpBurst(sh.x, sh.y, sh.color, sh.skill);                       // 맞은 곳에 폭발 (내 화면)
                    chSend('burst', { x: sh.x, y: sh.y, color: sh.color, big: sh.skill }); // 상대 화면에도
                    if (m.hp <= 0) { m.hp = 0; m.dead = true; sendState(); chSend('dead', {}); endMatch(1 - PVP.myIndex); return; }
                }
            }
            // 폭발 이펙트 수명 갱신
            for (let i = PVP.bursts.length - 1; i >= 0; i--) {
                const b = PVP.bursts[i]; b.life--; b.r = b.maxR * (1 - b.life / b.maxLife);
                if (b.life <= 0) PVP.bursts.splice(i, 1);
            }
            if (ts - PVP.lastSend > NET_MS) { PVP.lastSend = ts; sendState(); }
            PVP.animFrame = Math.floor(ts / 150);
            arenaRender();
            PVP.raf = requestAnimationFrame(pvpFrame);
        }

        function arenaRender() {
            const ctx = PVP.ctx, m = PVP.me, o = PVP.opp; if (!ctx) return;
            ctx.fillStyle = '#0d1426'; ctx.fillRect(0, 0, ARENA_W, ARENA_H);
            ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
            for (let gx = 0; gx <= ARENA_W; gx += 40) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, ARENA_H); ctx.stroke(); }
            for (let gy = 0; gy <= ARENA_H; gy += 40) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(ARENA_W, gy); ctx.stroke(); }
            // 스킬 폭발 이펙트 (메인 게임과 같은 빛나는 방사형)
            PVP.bursts.forEach(b => {
                const alpha = b.life / b.maxLife, prog = 1 - alpha, rgb = hexToRgb(b.color), R = Math.max(1, b.r);
                ctx.save(); ctx.globalCompositeOperation = 'lighter';
                const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, R);
                g.addColorStop(0, `rgba(${rgb}, ${0.55 * alpha})`);
                g.addColorStop(0.55, `rgba(${rgb}, ${0.22 * alpha})`);
                g.addColorStop(1, `rgba(${rgb}, 0)`);
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(b.x, b.y, R, 0, Math.PI * 2); ctx.fill();
                const core = Math.max(0, 1 - prog * 2);
                if (core > 0) { ctx.fillStyle = `rgba(255,255,255,${0.9 * core})`; ctx.beginPath(); ctx.arc(b.x, b.y, 10 * core + 3, 0, Math.PI * 2); ctx.fill(); }
                ctx.restore();
            });
            // 발사체: 스킬은 빛나는 구체, 기본공격은 작은 탄
            PVP.shots.forEach(sh => {
                if (sh.skill) {
                    const rgb = hexToRgb(sh.color), R = sh.r * 2.4;
                    ctx.save(); ctx.globalCompositeOperation = 'lighter';
                    const g = ctx.createRadialGradient(sh.x, sh.y, 0, sh.x, sh.y, R);
                    g.addColorStop(0, `rgba(${rgb}, 0.95)`);
                    g.addColorStop(0.5, `rgba(${rgb}, 0.45)`);
                    g.addColorStop(1, `rgba(${rgb}, 0)`);
                    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(sh.x, sh.y, R, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(sh.x, sh.y, sh.r * 0.55, 0, Math.PI * 2); ctx.fill();
                } else {
                    ctx.fillStyle = sh.color || '#fff'; ctx.beginPath(); ctx.arc(sh.x, sh.y, sh.r, 0, Math.PI * 2); ctx.fill();
                }
            });

            const SP_W = 48, SP_H = 56;
            function drawP(p, isMe) {
                if (!p) return;
                const other = isMe ? o : m;
                const faceLeft = other ? (other.x < p.x) : false;   // 상대를 바라봄
                const sprites = p.sprites;
                let frames = sprites ? (faceLeft ? sprites.left : sprites.right) : null;
                if (frames && !frames.length) frames = sprites.right;
                // 발밑 색 그림자 (나=파랑 / 상대=빨강 구분)
                ctx.fillStyle = isMe ? 'rgba(74,163,255,0.55)' : 'rgba(255,90,90,0.55)';
                ctx.beginPath(); ctx.ellipse(p.x, p.y + SP_H / 2 - 6, PLAYER_R, 6, 0, 0, Math.PI * 2); ctx.fill();
                const img = frames && frames[PVP.animFrame % frames.length];
                ctx.globalAlpha = p.dead ? 0.3 : 1;
                if (img && img.complete && img.naturalWidth > 0) {
                    const needFlip = faceLeft && (!sprites.left || !sprites.left.length);
                    ctx.save();
                    if (needFlip) { ctx.translate(p.x, 0); ctx.scale(-1, 1); ctx.translate(-p.x, 0); }
                    ctx.drawImage(img, p.x - SP_W / 2, p.y - SP_H / 2, SP_W, SP_H);
                    ctx.restore();
                } else {
                    ctx.fillStyle = isMe ? '#4aa3ff' : '#ff5a5a';
                    ctx.beginPath(); ctx.arc(p.x, p.y, PLAYER_R, 0, Math.PI * 2); ctx.fill();
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
                }
                ctx.globalAlpha = 1;
                ctx.fillStyle = isMe ? '#9fd0ff' : '#ffb3b3'; ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
                ctx.fillText(isMe ? '나' : (p.name || '상대'), p.x, p.y - SP_H / 2 - 1);
            }
            function drawBar(x, y, w, col, ratio, label, right) {
                ratio = Math.max(0, Math.min(1, ratio || 0));
                ctx.fillStyle = '#1b2334'; ctx.fillRect(x, y, w, 12);
                ctx.fillStyle = col; ctx.fillRect(right ? x + w - w * ratio : x, y, w * ratio, 12);
                ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.strokeRect(x, y, w, 12);
                ctx.fillStyle = '#fff'; ctx.font = '9px Arial'; ctx.textAlign = right ? 'right' : 'left'; ctx.textBaseline = 'middle';
                ctx.fillText(label, right ? x + w - 3 : x + 3, y + 6);
            }
            drawP(o, false); drawP(m, true);
            drawBar(8, 8, 200, '#ff5a5a', m.hp / m.maxHp, '나 ' + Math.max(0, Math.round(m.hp)), false);
            drawBar(8, 24, 200, '#4aa3ff', m.mana / m.maxMana, 'MP', false);
            if (o) drawBar(ARENA_W - 208, 8, 200, '#ff5a5a', (o.maxHp ? o.hp / o.maxHp : 0), (o.name || '상대') + ' ' + Math.max(0, Math.round(o.hp)), true);
        }

        function pvpLeaveToLobby() {
            leaveChannel();
            if (PVP.raf) { cancelAnimationFrame(PVP.raf); PVP.raf = null; }
            PVP.code = null; PVP.myIndex = 0; PVP.status = 'lobby';
            PVP.autoMatching = false; PVP.started = false;
            PVP.me = null; PVP.opp = null; PVP.shots = [];
            pvpUI();
        }

        // ============================================================
        //  💬 채팅 (월드 / 길드 / 친구) — Supabase Realtime broadcast
        //  실시간 전달. 같은 세션 동안은 받은 메시지가 쌓여(간이 기록).
        // ============================================================
        const CHAT = { open: false, tab: 'world', subs: {}, loaded: {}, msgs: { world: [], guild: [], friend: [] }, friend: null };

        // 영구 기록 불러오기 (방마다 한 번)
        function chatLoad(tab) {
            const room = chatRoom(tab); if (!room || CHAT.loaded[room]) return;
            CHAT.loaded[room] = true;
            fetch(RANK_API + '?chat=history&room=' + encodeURIComponent(room) + '&t=' + Date.now())
                .then(r => r.json())
                .then(arr => {
                    if (!Array.isArray(arr)) return;
                    const me = myName();
                    const hist = arr.map(m => ({ name: m.name, text: m.text, mine: m.name === me }));
                    CHAT.msgs[tab] = hist.concat(CHAT.msgs[tab] || []);
                    if (CHAT.msgs[tab].length > 80) CHAT.msgs[tab] = CHAT.msgs[tab].slice(-80);
                    if (CHAT.open && CHAT.tab === tab) renderChatMsgs();
                })
                .catch(() => {});
        }
        // 영구 저장 (전송과 함께)
        function chatPersist(room, name, text) {
            if (!room) return;
            fetch(RANK_API, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ chat: 'send', room, name, text }) }).catch(() => {});
        }

        function chatRoom(tab) {
            if (tab === 'world') return 'chat-world';
            if (tab === 'guild') return game.guildName ? 'chat-guild-' + game.guildName : null;
            if (tab === 'friend') return CHAT.friend ? 'chat-dm-' + [myName(), CHAT.friend].sort().join('__') : null;
            return null;
        }
        function chatSub(tab) {
            const room = chatRoom(tab); if (!room) return null;
            if (CHAT.subs[room]) return CHAT.subs[room];
            const sb = sbClient(); if (!sb) return null;
            const ch = sb.channel(room, { config: { broadcast: { self: false } } });
            ch.on('broadcast', { event: 'msg' }, ({ payload }) => {
                if (payload) chatPush(tab, { name: payload.name, text: payload.text, mine: false });
            });
            ch.subscribe();
            CHAT.subs[room] = ch;
            return ch;
        }
        function chatPush(tab, m) {
            const arr = CHAT.msgs[tab]; arr.push(m); if (arr.length > 80) arr.shift();
            if (CHAT.open && CHAT.tab === tab) renderChatMsgs();
        }
        function openChat() {
            if (!window.supabase || !sbClient()) { alert('실시간 서버 로딩 중 — 잠시 후 다시 시도하세요'); return; }
            CHAT.open = true; game.chatOpen = true;
            document.getElementById('chatModal').style.display = 'flex';
            chatSub('world'); chatSub('guild'); // 미리 구독해 백그라운드로도 수신
            chatLoad('world'); chatLoad('guild');
            renderChat();
        }
        function closeChat() {
            CHAT.open = false; game.chatOpen = false;
            for (const k in keys) keys[k] = false;
            document.getElementById('chatModal').style.display = 'none';
        }
        function setChatTab(t) { CHAT.tab = t; if (t !== 'friend') { chatSub(t); chatLoad(t); } renderChat(); }
        function setFriend() {
            const inp = document.getElementById('chatFriendInput'); if (!inp) return;
            const n = (inp.value || '').trim().slice(0, 12); if (!n) return;
            CHAT.friend = n; CHAT.msgs.friend = []; chatSub('friend'); chatLoad('friend'); renderChat();
        }
        function sendChat() {
            const inp = document.getElementById('chatInput'); if (!inp) return;
            const text = (inp.value || '').trim().slice(0, 200); if (!text) return;
            const tab = CHAT.tab;
            if (tab === 'guild' && !game.guildName) { alert('길드에 먼저 가입하세요'); return; }
            if (tab === 'friend' && !CHAT.friend) { alert('먼저 친구 닉네임을 입력하고 연결하세요'); return; }
            const ch = chatSub(tab); if (!ch) { alert('채팅방을 열 수 없어요'); return; }
            ch.send({ type: 'broadcast', event: 'msg', payload: { name: myName(), text } });
            chatPush(tab, { name: myName(), text, mine: true });
            chatPersist(chatRoom(tab), myName(), text); // 영구 저장
            inp.value = '';
        }
        function renderChat() {
            const body = document.getElementById('chatBody'); if (!body) return;
            const tabs = [['world', '🌍 월드'], ['guild', '🏰 길드'], ['friend', '👥 친구']];
            const tabHtml = tabs.map(([k, l]) => `<button class="chat-tab ${CHAT.tab === k ? 'on' : ''}" onclick="setChatTab('${k}')">${l}</button>`).join('');
            const friendBar = CHAT.tab === 'friend'
                ? `<div class="chat-friend"><input id="chatFriendInput" maxlength="12" placeholder="대화할 친구 닉네임" value="${CHAT.friend ? pvpEsc(CHAT.friend) : ''}"><button class="chat-send" onclick="setFriend()">연결</button></div>`
                : '';
            body.innerHTML =
                `<div class="chat-close" onclick="closeChat()">✕</div>
                 <div class="chat-tabs">${tabHtml}</div>
                 ${friendBar}
                 <div id="chatMsgs" class="chat-msgs"></div>
                 <div class="chat-input-row">
                    <input id="chatInput" maxlength="200" placeholder="메시지 입력 후 Enter" onkeydown="if(event.key==='Enter'){event.preventDefault();sendChat();}">
                    <button class="chat-send" onclick="sendChat()">보내기</button>
                 </div>`;
            renderChatMsgs();
            const ci = document.getElementById('chatInput'); if (ci) ci.focus();
        }
        function renderChatMsgs() {
            const box = document.getElementById('chatMsgs'); if (!box) return;
            const tab = CHAT.tab;
            if (tab === 'guild' && !game.guildName) { box.innerHTML = '<div class="chat-empty">길드에 가입하면 길드원과 대화할 수 있어요</div>'; return; }
            if (tab === 'friend' && !CHAT.friend) { box.innerHTML = '<div class="chat-empty">친구 닉네임을 입력하고 «연결»을 누르세요</div>'; return; }
            const arr = CHAT.msgs[tab] || [];
            box.innerHTML = arr.map(m => `<div class="cm ${m.mine ? 'mine' : ''}"><b>${pvpEsc(m.name)}</b> ${pvpEsc(m.text)}</div>`).join('')
                || '<div class="chat-empty">아직 메시지가 없어요. 먼저 인사해보세요! 👋</div>';
            box.scrollTop = box.scrollHeight;
        }

        // ============================================================
        //  🏪 경매장 — 플레이어끼리 장비 거래 (Supabase DB)
        //  팔기: 가방→매물(코인 정산 대기) / 사기: 코인 지불→가방 / 정산: 받기
        // ============================================================
        const AUC = { open: false, tab: 'browse', list: [], payout: 0, sel: null, loading: false, search: '' };
        function aucSetSearch(v) { AUC.search = v || ''; renderAucList(); } // 목록만 갱신 → 입력 포커스 유지
        function aucBrowseRowsHtml() {
            if (AUC.loading && !AUC.list.length) return '<div class="auc-empty">불러오는 중…</div>';
            if (!AUC.list.length) return '<div class="auc-empty">올라온 매물이 없어요. 첫 판매자가 되어보세요!</div>';
            const q = (AUC.search || '').trim().toLowerCase();
            const me = myName();
            const filtered = q ? AUC.list.filter(l => (aucLabel(l.item) + ' ' + l.seller).toLowerCase().includes(q)) : AUC.list;
            if (!filtered.length) return '<div class="auc-empty">검색 결과가 없어요</div>';
            return filtered.map(l => {
                const mine = l.seller === me;
                const btn = mine ? `<button class="auc-btn cancel" onclick="aucCancelListing(${l.id})">회수</button>`
                                 : `<button class="auc-btn" onclick="aucBuy(${l.id})">구매</button>`;
                return `<div class="auc-row"><div class="nm" style="color:${aucColor(l.item)}">${pvpEsc(aucLabel(l.item))}<div class="pw">공${itemAtk(l.item)} 방${itemDef(l.item)} · ${pvpEsc(l.seller)}</div></div><div class="pr">${l.price.toLocaleString()}🪙</div>${btn}</div>`;
            }).join('');
        }
        function renderAucList() { const el = document.getElementById('aucListBox'); if (el) el.innerHTML = aucBrowseRowsHtml(); }
        function aucColor(it) { return (RARITIES[it.rarity] || RARITIES[0]).color; }
        function aucLabel(it) {
            const base = ITEM_BASE[it.cat] || { name: it.cat, icon: '❓' };
            const tags = (it.star ? ' ★' + it.star : '') + (it.upg ? ' +' + it.upg : '');
            return `${base.icon} ${rarityLabel(it)} ${base.name}${tags}`;
        }
        function aucPost(body) {
            return fetch(RANK_API, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(body) }).then(r => r.json());
        }
        function openAuction() {
            AUC.open = true; game.aucOpen = true; AUC.tab = 'browse'; AUC.sel = null;
            document.getElementById('aucModal').style.display = 'flex';
            aucRefresh(); aucFetchPayout(); renderAuc();
        }
        function closeAuction() {
            AUC.open = false; game.aucOpen = false;
            for (const k in keys) keys[k] = false;
            document.getElementById('aucModal').style.display = 'none';
        }
        function setAucTab(t) { AUC.tab = t; AUC.sel = null; if (t === 'browse') aucRefresh(); if (t === 'claim') aucFetchPayout(); renderAuc(); }
        function aucRefresh() {
            AUC.loading = true; if (AUC.open && AUC.tab === 'browse') renderAuc();
            fetch(RANK_API + '?auc=list&t=' + Date.now()).then(r => r.json())
                .then(arr => { AUC.list = Array.isArray(arr) ? arr : []; AUC.loading = false; if (AUC.open && AUC.tab === 'browse') renderAuc(); })
                .catch(() => { AUC.loading = false; });
        }
        function aucFetchPayout() {
            fetch(RANK_API + '?auc=payout&name=' + encodeURIComponent(myName()) + '&t=' + Date.now()).then(r => r.json())
                .then(d => { AUC.payout = (d && d.coins) || 0; if (AUC.open && AUC.tab === 'claim') renderAuc(); }).catch(() => {});
        }
        function aucBuy(id) {
            const lst = AUC.list.find(l => l.id === id); if (!lst) return;
            if (lst.seller === myName()) return;
            if (game.coins < lst.price) { floatMsg('코인 부족!', '#ff6b6b'); return; }
            aucPost({ auc: 'buy', id, buyer: myName() }).then(res => {
                if (res && res.ok) {
                    game.coins -= res.price;
                    const it = res.item; it.id = game.nextItemId++;
                    addToBag(it);
                    floatMsg('🏪 구매 완료! ' + aucLabel(it), '#2ecc71');
                    saveProgress(); aucRefresh();
                } else floatMsg(res && res.error === 'gone' ? '이미 팔렸어요' : '구매 실패', '#ff6b6b');
            }).catch(() => floatMsg('서버 연결 실패', '#ff6b6b'));
        }
        function aucCancelListing(id) {
            aucPost({ auc: 'cancel', id, seller: myName() }).then(res => {
                if (res && res.ok) { const it = res.item; it.id = game.nextItemId++; addToBag(it); floatMsg('매물 회수 완료', '#aaa'); saveProgress(); aucRefresh(); }
                else floatMsg('회수 실패', '#ff6b6b');
            }).catch(() => floatMsg('서버 연결 실패', '#ff6b6b'));
        }
        function aucSelectBag(id) { AUC.sel = (AUC.sel === id ? null : id); renderAuc(); }
        function aucSell() {
            const it = AUC.sel != null ? getItemById(AUC.sel) : null;
            if (!it) { floatMsg('팔 아이템을 골라주세요', '#ff6b6b'); return; }
            if (Object.values(game.equipped).includes(it.id)) { floatMsg('장착 중인 장비는 못 팔아요', '#ff6b6b'); return; }
            const inp = document.getElementById('aucPriceInput');
            const price = Math.floor(Number(inp && inp.value) || 0);
            if (price < 1) { floatMsg('가격을 입력하세요', '#ff6b6b'); return; }
            const itemCopy = JSON.parse(JSON.stringify(it));
            aucPost({ auc: 'sell', seller: myName(), price, item: itemCopy }).then(res => {
                if (res && res.ok) {
                    game.bag = game.bag.filter(b => b.id !== it.id);
                    if (game.selectedItemId === it.id) game.selectedItemId = null;
                    AUC.sel = null;
                    floatMsg('🏪 경매장 등록! ' + price.toLocaleString() + '🪙', '#f1c40f');
                    saveProgress(); renderAuc();
                } else floatMsg('등록 실패', '#ff6b6b');
            }).catch(() => floatMsg('서버 연결 실패', '#ff6b6b'));
        }
        function aucClaim() {
            aucPost({ auc: 'claim', name: myName() }).then(res => {
                const c = (res && res.coins) || 0;
                if (c > 0) { game.coins += c; AUC.payout = 0; floatMsg('💰 정산 +' + c.toLocaleString() + '🪙', '#2ecc71'); saveProgress(); }
                else floatMsg('받을 코인이 없어요', '#aaa');
                renderAuc();
            }).catch(() => floatMsg('서버 연결 실패', '#ff6b6b'));
        }
        function renderAuc() {
            const body = document.getElementById('aucBody'); if (!body) return;
            const tabs = [['browse', '🛒 매물'], ['sell', '💰 팔기'], ['claim', '📦 정산']];
            const tabHtml = tabs.map(([k, l]) => `<button class="auc-tab ${AUC.tab === k ? 'on' : ''}" onclick="setAucTab('${k}')">${l}</button>`).join('');
            let inner = '';
            if (AUC.tab === 'browse') {
                inner = `<div class="auc-sellbar" style="margin:0 0 8px">
                            <input id="aucSearchInput" style="flex:1;width:auto" placeholder="🔍 검색 (등급·부위·판매자)" value="${pvpEsc(AUC.search)}" oninput="aucSetSearch(this.value)">
                            <button class="auc-btn" onclick="aucRefresh()">🔄 새로고침</button>
                         </div>
                         <div class="auc-list" id="aucListBox">${aucBrowseRowsHtml()}</div>`;
            } else if (AUC.tab === 'sell') {
                const eq = Object.values(game.equipped);
                const items = game.bag.filter(b => !eq.includes(b.id));
                const rows = items.length ? items.map(it => `<div class="auc-row ${AUC.sel === it.id ? 'sel' : ''}" onclick="aucSelectBag(${it.id})"><div class="nm" style="color:${aucColor(it)}">${pvpEsc(aucLabel(it))}<div class="pw">공${itemAtk(it)} 방${itemDef(it)}</div></div></div>`).join('')
                                          : '<div class="auc-empty">팔 수 있는 장비가 없어요 (장착 중인 건 제외)</div>';
                const sel = AUC.sel != null ? getItemById(AUC.sel) : null;
                inner = `<div class="auc-list">${rows}</div>
                    <div class="auc-sellbar">
                        <span class="lab">${sel ? '선택: ' + pvpEsc(aucLabel(sel)) : '아이템을 골라주세요'}</span>
                        <input id="aucPriceInput" type="number" min="1" placeholder="가격(코인)">
                        <button class="auc-btn" onclick="aucSell()">등록</button>
                    </div>`;
            } else {
                inner = `<div class="auc-list"><div class="auc-empty" style="font-size:14px">내가 판 아이템의 정산 대기 코인<br><br><b style="color:#ffd166;font-size:24px">${AUC.payout.toLocaleString()} 🪙</b></div></div>
                    <div class="auc-sellbar"><span class="lab">팔린 만큼 여기 쌓여요. 받아서 코인에 추가하세요.</span><button class="auc-btn" onclick="aucClaim()">💰 정산 받기</button></div>`;
            }
            body.innerHTML = `<div class="auc-close" onclick="closeAuction()">✕</div>
                <div class="auc-head"><h2>🏪 경매장</h2><span class="auc-coins">보유 ${game.coins.toLocaleString()}🪙</span></div>
                <div class="auc-tabs">${tabHtml}</div>${inner}`;
        }

        // ============================================================
        //  🏰 길드 (구글시트 백엔드 — RANK_API 공유)
        //  만들기/가입/목록/멤버·기여/탈퇴 + 길드 랭킹(총점)
        // ============================================================
        const GUILD = { list: [], info: null, loading: false };
        function myName() { return (document.getElementById('charName').textContent || '모험가').trim(); }

        function guildFetchList() {
            if (!RANK_API) return;
            GUILD.loading = true;
            fetch(RANK_API + '?guild=list&t=' + Date.now())
                .then(r => r.json())
                .then(arr => { if (Array.isArray(arr)) GUILD.list = arr; GUILD.loading = false; })
                .catch(() => { GUILD.loading = false; });
        }
        function guildFetchInfo(name) {
            if (!RANK_API || !name) return;
            GUILD.loading = true;
            fetch(RANK_API + '?guild=info&name=' + encodeURIComponent(name) + '&t=' + Date.now())
                .then(r => r.json())
                .then(d => {
                    GUILD.loading = false;
                    if (d && !d.error) {
                        GUILD.info = d;
                        // 길드 공유 강화 레벨 동기화 (모든 길드원이 같은 보너스)
                        game.guildUpgrade = { atk: (d.upgrades && d.upgrades.atk) || 0, def: (d.upgrades && d.upgrades.def) || 0, hp: (d.upgrades && d.upgrades.hp) || 0 };
                    } else { GUILD.info = null; game.guildName = ''; game.guildUpgrade = { atk: 0, def: 0, hp: 0 }; saveProgress(); } // 길드가 사라짐
                })
                .catch(() => { GUILD.loading = false; });
        }
        function guildPost(body) {
            return fetch(RANK_API, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(body)
            }).then(r => r.json());
        }
        function guildCreatePrompt() {
            if (game.guildName) { floatMsg('이미 길드에 가입돼 있어요', '#ff6b6b'); return; }
            const name = (prompt('만들 길드 이름 (최대 16자)') || '').trim().slice(0, 16);
            if (!name) return;
            guildPost({ guild: 'create', name, player: myName(), score: computeScore() }).then(res => {
                if (res && res.ok) {
                    game.guildName = res.name; saveProgress();
                    guildFetchInfo(game.guildName);
                    floatMsg('🏰 길드 «' + res.name + '» 생성!', '#2ecc71');
                } else if (res && res.error === 'exists') floatMsg('이미 있는 길드 이름!', '#ff6b6b');
                else floatMsg('생성 실패', '#ff6b6b');
            }).catch(() => floatMsg('서버 연결 실패', '#ff6b6b'));
        }
        function guildJoin(name) {
            if (game.guildName) { floatMsg('이미 길드에 가입돼 있어요', '#ff6b6b'); return; }
            if (!name) return;
            guildPost({ guild: 'join', name, player: myName(), score: computeScore() }).then(res => {
                if (res && res.ok) {
                    game.guildName = res.name; saveProgress();
                    guildFetchInfo(game.guildName);
                    floatMsg('🏰 «' + res.name + '» 가입!', '#2ecc71');
                } else floatMsg('가입 실패 (길드 없음)', '#ff6b6b');
            }).catch(() => floatMsg('서버 연결 실패', '#ff6b6b'));
        }
        function guildContribute() {
            if (!game.guildName) return;
            guildPost({ guild: 'contribute', name: game.guildName, player: myName(), score: computeScore() }).then(res => {
                if (res && res.ok) { floatMsg('💪 길드에 기여! (점수 ' + computeScore().toLocaleString() + ')', '#2ecc71'); guildFetchInfo(game.guildName); }
                else floatMsg('기여 실패', '#ff6b6b');
            }).catch(() => floatMsg('서버 연결 실패', '#ff6b6b'));
        }
        function guildLeave() {
            if (!game.guildName) return;
            if (!confirm('정말 길드 «' + game.guildName + '»에서 탈퇴할까요?')) return;
            const old = game.guildName;
            guildPost({ guild: 'leave', name: old, player: myName() }).then(() => {
                game.guildName = ''; GUILD.info = null;
                game.guildUpgrade = { atk: 0, def: 0, hp: 0 }; // 공유 강화 보너스 해제
                saveProgress();
                guildFetchList();
                floatMsg('길드에서 탈퇴했어요', '#aaa');
            }).catch(() => floatMsg('서버 연결 실패', '#ff6b6b'));
        }

        // === 길드전: 1분간 무적 보스에게 최대한 데미지 (총 데미지 = 길드 기여점수) ===
        const RAID_FRAMES = 60 * 60; // 1분
        function startGuildRaid() {
            if (!game.guildName) { floatMsg('길드에 먼저 가입하세요', '#ff6b6b'); return; }
            if (game.raidActive) return;
            // 다른 모달/던전 정리하고 사냥터로
            game.showEvent = false; game.eventTab = null;
            game.inExpDungeon = false; game.inMedalDungeon = false;
            if (game.inTown) leaveTown();
            game.raidActive = true;
            game.raidTimer = RAID_FRAMES;
            game.raidDamage = 0;
            game.boss = null; game.serverBoss = null;
            game.monsters = [];
            game.character.x = 300;
            game.character.stats.hp = effMaxHp();
            // 무적 보스 소환 (가운데, 거대)
            const boss = new Monster(MAP.width / 2, 300, 'boss', { isBoss: true, hp: 1e18, damage: 0, coinReward: 0, expReward: 0 });
            boss.isRaid = true;
            boss.maxHp = 1e18;
            boss.width = 240; boss.height = 280;
            boss.attackRange = 0;        // 플레이어를 때리지 않음
            boss.speed = 0;
            boss.label = '🛡️ 길드전 보스 (무적)';
            boss.image = finalBossImg;
            game.raidBoss = boss;
            game.monsters.push(boss);
            floatMsg('⚔️ 길드전 시작! 1분간 최대한 때려라!', '#ff6b6b');
        }
        function endGuildRaid() {
            game.raidActive = false;
            game.raidTimer = 0;
            game.monsters = game.monsters.filter(m => !m.isRaid);
            game.raidBoss = null;
            const dmg = Math.round(game.raidDamage);
            const isBest = dmg > game.raidBest;
            if (isBest) game.raidBest = dmg;
            game.deathMsg = 0;
            floatMsg(`🏁 길드전 종료! 총 데미지 ${dmg.toLocaleString()}${isBest ? ' (최고기록!)' : ''}`, '#ffd700');
            saveProgress();
            // 최고 데미지를 길드에 기여(랭킹 반영)
            if (game.guildName && game.raidBest > 0) {
                guildPost({ guild: 'contribute', name: game.guildName, player: myName(), score: game.raidBest })
                    .then(() => guildFetchInfo(game.guildName)).catch(() => {});
            }
            goToZone(game.currentZone); // 원래 사냥터 복귀
        }

        // === 길드 상점 (단계별 해금) — lv: 필요 상점레벨 ===
        const SHOP_MAX_LEVEL = 2;
        const SHOP_UP_COST = [1000000, 5000000]; // 0→1, 1→2 업그레이드 비용
        const SHARD_BUY = 500;                   // 훈장조각 구매 수량 (한 번 사면 강화에 바로 보탬)
        const GUILD_SHOP = [
            { key: 'equipUni',  label: '🟠 유니크 장비',   cost: 250000,  desc: '유니크 등급 장비 1개',  lv: 0 },
            { key: 'equipLeg',  label: '🟢 레전더리 장비', cost: 800000,  desc: '레전더리 등급 장비 1개', lv: 0 },
            { key: 'gem7',      label: '💎 보석 7등급',     cost: 150000,  desc: '랜덤 보석 7등급 1개',   lv: 0 },
            { key: 'gem5',      label: '💎 보석 5등급',     cost: 600000,  desc: '랜덤 보석 5등급 1개',   lv: 0 },
            { key: 'shard',     label: '🎗️ 훈장 조각',      cost: 50000,   desc: '훈장 조각 +' + SHARD_BUY, lv: 1 },
            { key: 'exp',       label: '📘 경험치 포션',     cost: 400000,  desc: '경험치 대량 획득',      lv: 1 },
            { key: 'soul',      label: '🔮 직업의 혼',       cost: 10000000, desc: '각성! 공격력 2배 + 새 스킬', lv: 2 }
        ];
        function shopUpgradeCost() { return SHOP_UP_COST[game.guildShopLevel]; }
        function upgradeGuildShop() {
            if (!game.guildName) { floatMsg('길드에 먼저 가입하세요', '#ff6b6b'); return; }
            if (game.guildShopLevel >= SHOP_MAX_LEVEL) { floatMsg('이미 최고 단계!', '#ffd700'); return; }
            const cost = shopUpgradeCost();
            if (game.coins < cost) { floatMsg('코인 부족!', '#ff6b6b'); return; }
            game.coins -= cost;
            game.guildShopLevel++;
            const unlocked = game.guildShopLevel === 1 ? '훈장조각·경험치 판매 해금!' : '🔮 직업의 혼(각성) 해금!';
            floatMsg(`🛒 길드 상점 Lv.${game.guildShopLevel}! ${unlocked}`, '#2ecc71');
            saveProgress();
        }
        // 경험치 대량 지급 (레벨업 처리 포함)
        function grantExp(amount) {
            const st = game.character.stats;
            st.exp += amount;
            while (st.exp >= st.maxExp) {
                st.exp -= st.maxExp; st.level++; st.maxExp += DIFF.levelExpAdd;
                st.statPoints += 5; st.maxHp += 20; st.maxMana += 10;
            }
            st.hp = effMaxHp(); st.mana = st.maxMana;
        }
        function buyGuildItem(key) {
            const it = GUILD_SHOP.find(s => s.key === key);
            if (!it) return;
            if ((it.lv || 0) > game.guildShopLevel) { floatMsg('상점 업그레이드 필요!', '#ff6b6b'); return; }
            if (key === 'soul' && game.awakened) { floatMsg('이미 각성했어요!', '#ffd700'); return; }
            if (game.coins < it.cost) { floatMsg('코인 부족!', '#ff6b6b'); return; }
            game.coins -= it.cost;
            if (key === 'equipUni' || key === 'equipLeg') {
                const rarity = key === 'equipLeg' ? 4 : 3;
                const cat = ITEM_CATS[Math.floor(Math.random() * ITEM_CATS.length)];
                const item = makeItem(cat, rarity);
                addToBag(item); autoEquipIfBetter(item);
                floatMsg(`🛒 ${RARITIES[rarity].name} ${cat} 획득!`, RARITIES[rarity].color);
            } else if (key === 'gem5' || key === 'gem7') {
                const grade = key === 'gem5' ? 5 : 7;
                const t = GEM_TYPES[Math.floor(Math.random() * GEM_TYPES.length)];
                addGem(t.key, grade, 1);
                floatMsg(`💎 ${t.name} 보석 ${grade}등급 획득!`, '#18ffff');
            } else if (key === 'shard') {
                game.medalShards = (game.medalShards || 0) + SHARD_BUY;
                floatMsg(`🎗️ 훈장 조각 +${SHARD_BUY}`, '#ffd166');
            } else if (key === 'exp') {
                const amt = game.character.stats.maxExp * 5;
                grantExp(amt);
                floatMsg(`📘 경험치 +${Math.round(amt).toLocaleString()}!`, '#ffff00');
            } else if (key === 'soul') {
                game.awakened = true;
                applyAwakening();
                game.skillCooldowns = { q: 0, w: 0, e: 0, f: 0, r: 0 };
                floatMsg(`🔮 ${game.character.job} 각성! 공격력 2배 + 새 스킬 획득!`, '#e040fb');
            }
            saveProgress();
        }

        const MENU_TABS = [
            { tab: 'help',     label: '📖 설명' },
            { tab: 'rank',     label: '🏆 랭킹' },
            { tab: 'credit',   label: '👤 제작자' },
            { tab: 'settings', label: '⚙️ 설정' }
        ];
        function drawMenu() {
            const vs = document.getElementById('volSlider');
            if (!game.showMenu) { if (vs && vs.style.display !== 'none') vs.style.display = 'none'; return; }
            const W = canvas.width, H = canvas.height;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
            ctx.fillRect(0, 0, W, H);

            const pw = 660, ph = 460;
            const px = (W - pw) / 2, py = (H - ph) / 2;
            ctx.fillStyle = UI.panelBg; ctx.fillRect(px, py, pw, ph);
            ctx.strokeStyle = UI.panelBorder; ctx.lineWidth = 3; ctx.strokeRect(px, py, pw, ph);

            game.menuButtons = [];

            // 닫기 버튼

        // ===================== 🎵 리듬게임 (노래노래 이벤트) =====================
        // 방향키 ←↑↓→ 4키. 7월 10일까지 진행되는 "노래노래 이벤트".
        // 할 때마다 🎵음표 재화를 얻고, 한정 상점에서 음표로 [마이크 무기]·[음표공격 스킬]을 각각 1회 구매.
        const RHYTHM_EVENT_END = new Date('2026-07-10T23:59:59');
        function rhythmEventActive() { return new Date() <= RHYTHM_EVENT_END; }
        const MIKE_COST = 30;                     // 🎤 마이크 가격 (음표)
        const NOTESKILL_COST = 25;                // 🎵 음표공격 스킬 가격 (음표)
        const MIKE_ATK = 700;                     // 마이크 공격력 (고정)
        const RG_KEYS = ['arrowleft', 'arrowup', 'arrowdown', 'arrowright'];
        const RG_LABELS = ['←', '↑', '↓', '→'];
        const RG_COLORS = ['#ff5a7a', '#ffd166', '#4dd2ff', '#7CFC8A'];
        const RG_APPROACH = 1500;                 // 노트가 위에서 판정선까지 내려오는 시간(ms)
        const RG_SONG_LEN = 48000;                // 채보 길이(ms)
        const RG_PERFECT = 55, RG_GOOD = 120;     // 판정 윈도우(ms)

        const rg = {
            state: 'intro',  // intro | play | result
            notes: [], startT: 0, score: 0, combo: 0, maxCombo: 0,
            hits: { perfect: 0, good: 0, miss: 0 },
            judge: '', judgeColor: '#fff', judgeT: 0,
            flash: [0, 0, 0, 0], lastScore: 0, coinReward: 0, gotMike: false,
            buttons: []
        };
        let rgBest = parseInt(localStorage.getItem('rhythmBest') || '0', 10) || 0;

        // 시드 난수 → 채보가 매번 같게(연습 가능)
        function rgSeeded(seed) {
            let s = seed >>> 0;
            return function () { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; };
        }
        function rgBuildChart() {
            const rand = rgSeeded(20260710);
            const notes = [];
            const beat = 380;
            let t = 1600;
            while (t < RG_SONG_LEN) {
                if (rand() < 0.18) { t += beat; continue; }      // 쉼표
                const lane = Math.floor(rand() * 4);
                notes.push({ time: t, lane, hit: false, dead: false });
                if (rand() < 0.12) {                              // 가끔 더블노트
                    let l2 = Math.floor(rand() * 4);
                    if (l2 === lane) l2 = (l2 + 1) % 4;
                    notes.push({ time: t, lane: l2, hit: false, dead: false });
                }
                t += (rand() < 0.3) ? beat / 2 : beat;            // 가끔 반박자
            }
            return notes;
        }
        function openRhythm() {
            game.showRhythm = true;
            game.showEvent = false; game.eventTab = null; game.showShop = false; game.showMenu = false;
            rg.state = 'intro';
        }
        function closeRhythm() { game.showRhythm = false; rg.state = 'intro'; }
        function startRhythm() {
            rg.notes = rgBuildChart();
            rg.score = 0; rg.combo = 0; rg.maxCombo = 0;
            rg.hits = { perfect: 0, good: 0, miss: 0 };
            rg.judge = ''; rg.judgeT = 0; rg.flash = [0, 0, 0, 0];
            rg.coinReward = 0; rg.gotMike = false;
            rg.startT = performance.now();
            rg.state = 'play';
            // 노래노래 이벤트 — 시작하면 음악 자동 재생 (P로 끌 수 있음)
            bgmOn = true; bgm.play().catch(() => {});
        }
        function rgSongTime() { return performance.now() - rg.startT; }
        function rgJudge(text, color) { rg.judge = text; rg.judgeColor = color; rg.judgeT = 1; }
        function rgHit(lane) {
            if (rg.state !== 'play') return;
            rg.flash[lane] = 1;
            const now = rgSongTime();
            let best = null, bestD = 1e9;
            for (const n of rg.notes) {
                if (n.lane !== lane || n.hit || n.dead) continue;
                const d = Math.abs(n.time - now);
                if (d < bestD) { bestD = d; best = n; }
            }
            if (best && bestD <= RG_GOOD) {
                best.hit = true;
                if (bestD <= RG_PERFECT) { rg.score += 300 + rg.combo * 2; rg.hits.perfect++; rgJudge('PERFECT', '#ffd166'); }
                else { rg.score += 120 + rg.combo; rg.hits.good++; rgJudge('GOOD', '#4dd2ff'); }
                rg.combo++; if (rg.combo > rg.maxCombo) rg.maxCombo = rg.combo;
            } else {
                rg.combo = 0; rgJudge('MISS', '#ff5a7a'); // 헛침은 콤보만 끊김(감점·미스집계 없음)
            }
        }
        function updateRhythm() {
            if (rg.state !== 'play') return;
            const now = rgSongTime();
            for (const n of rg.notes) {
                if (!n.hit && !n.dead && now - n.time > RG_GOOD) {
                    n.dead = true; rg.combo = 0; rg.hits.miss++; rgJudge('MISS', '#ff5a7a');
                }
            }
            if (rg.judgeT > 0) rg.judgeT -= 0.04;
            for (let i = 0; i < 4; i++) if (rg.flash[i] > 0) rg.flash[i] -= 0.08;
            if (now > RG_SONG_LEN + 800) rgFinish();
        }
        function rgFinish() {
            rg.state = 'result';
            rg.lastScore = rg.score;
            if (rg.score > rgBest) { rgBest = rg.score; localStorage.setItem('rhythmBest', String(rgBest)); }
            rg.coinReward = Math.round(rg.score * 0.5);
            game.coins += rg.coinReward;
            // 🎵 음표 재화 — 할 때마다 획득 (점수에 비례, 최소 3개)
            rg.notesEarned = Math.max(3, Math.floor(rg.score / 1000));
            game.musicNotes += rg.notesEarned;
            saveProgress();
        }
        // 🎤 마이크 무기 생성 (공격력 700 고정 · 잠재능력 "음표공격 데미지 2배" 고정 · 재설정 불가)
        function grantMike() {
            const it = makeItem('weapon', 5);     // 신화 무기 베이스
            it.special = 'mike';
            it.atk = MIKE_ATK; it.def = 0;
            it.star = 0; it.upg = 0;
            it.potential = [{ key: 'noteDmg', label: '음표공격 데미지', val: 100 }]; // +100% = 2배
            addToBag(it);
            autoEquipIfBetter(it);
        }
        // 마이크 장착 여부 (음표공격 데미지 2배 판정)
        function mikeEquipped() {
            const id = game.equipped.weapon;
            const it = id ? getItemById(id) : null;
            return !!(it && it.special === 'mike');
        }
        // === 한정 상점 구매 ===
        function buyMike() {
            if (game.boughtMike) { floatMsg('이미 구매한 무기예요', '#ff6b6b'); return; }
            if (game.musicNotes < MIKE_COST) { floatMsg('🎵 음표 부족!', '#ff6b6b'); return; }
            game.musicNotes -= MIKE_COST;
            game.boughtMike = true;
            grantMike();
            floatMsg('🎤 마이크 획득! (자동 장착)', '#ff9be3');
            saveProgress();
        }
        function buyNoteSkill() {
            if (game.hasNoteSkill) { floatMsg('이미 배운 스킬이에요', '#ff6b6b'); return; }
            if (game.musicNotes < NOTESKILL_COST) { floatMsg('🎵 음표 부족!', '#ff6b6b'); return; }
            game.musicNotes -= NOTESKILL_COST;
            game.hasNoteSkill = true;
            floatMsg('🎵 음표공격 습득! [T] 키로 사용', '#ff9be3');
            saveProgress();
        }
        // === 🎵 음표공격 스킬 (글로벌, [T] 키) — 300%, 사냥 중인 모든 적 타격. 마이크 장착 시 2배 ===
        const NOTESKILL_MULT = 3;       // 300%
        const NOTESKILL_MANA = 25;
        const NOTESKILL_CD = 100;       // 쿨다운(프레임)
        function noteSkillReady() {
            return game.hasNoteSkill && (game.skillCooldowns['note'] || 0) <= 0 &&
                   game.character.stats.mana >= NOTESKILL_MANA * MANA_COST_MULT;
        }
        function useNoteSkill() {
            if (!game.hasNoteSkill) return;
            const char = game.character;
            if (game.showMap || game.showShop || game.showQuest || game.selectingJob || game.eventTab || game.inTown || game.showRhythm) return;
            if ((game.skillCooldowns['note'] || 0) > 0) return;
            const manaCost = NOTESKILL_MANA * MANA_COST_MULT;
            if (char.stats.mana < manaCost) { floatMsg('마나 부족!', '#0099ff'); return; }
            if (game.monsters.length === 0) return;
            char.stats.mana -= manaCost;
            const cdReduce = Math.min(GEM_CD_CAP, gemBonus('cooldown'));
            game.skillCooldowns['note'] = Math.round(NOTESKILL_CD * (1 - cdReduce / 100));
            char.isAttacking = true; char.attackCounter = char.attackDuration;
            const x2 = mikeEquipped();
            const raw = effAttack() * NOTESKILL_MULT * (x2 ? 2 : 1);
            // 사냥 중인 모든 적에 음표 + 데미지
            game.monsters.slice().forEach(m => {
                const r = applyCombatMods(raw, m);
                damageMonster(m, r.dmg, '#ff9be3', r.crit);
                game.damageText.push({ x: m.x, y: m.y - 90, text: '🎵', alpha: 1, duration: 40, color: '#ff9be3' });
            });
            game.damageText.push({ x: char.x, y: char.y - 95, text: '음표공격' + (x2 ? ' ×2!' : ''), alpha: 1, duration: 35, color: '#ff9be3' });
        }
        // 인트로/결과 가운데 패널
        function drawRgPanel(lines) {
            const W = canvas.width, H = canvas.height;
            const bw = 540, bh = 290, bx = (W - bw) / 2, by = (H - bh) / 2;
            ctx.fillStyle = 'rgba(20,16,40,0.96)'; ctx.fillRect(bx, by, bw, bh);
            ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 3; ctx.strokeRect(bx, by, bw, bh);
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            let ly = by + 38;
            lines.forEach((ln, i) => {
                if (i === 0) { ctx.fillStyle = '#ffd166'; ctx.font = 'bold 26px Arial'; }
                else if (ln.startsWith('[')) { ctx.fillStyle = '#7CFC8A'; ctx.font = 'bold 22px Arial'; }
                else if (ln.startsWith('🎤')) { ctx.fillStyle = '#ff9be3'; ctx.font = 'bold 18px Arial'; }
                else { ctx.fillStyle = '#fff'; ctx.font = '16px Arial'; }
                if (ln) ctx.fillText(ln, W / 2, ly);
                ly += 32;
            });
        }
        // 리듬게임 버튼 1개 그리기 + 클릭영역 등록
        function rgBtn(x, y, w, h, label, color, act, textColor) {
            ctx.fillStyle = color; ctx.fillRect(x, y, w, h);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = textColor || '#fff'; ctx.font = 'bold 17px Arial';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(label, x + w / 2, y + h / 2);
            rg.buttons.push({ x, y, w, h, act });
        }
        function drawRhythm() {
            if (!game.showRhythm) return;
            const W = canvas.width, H = canvas.height;
            ctx.fillStyle = 'rgba(8,6,20,0.93)'; ctx.fillRect(0, 0, W, H);

            const laneW = 70, gap = 8;
            const totalW = laneW * 4 + gap * 3;
            const left = (W - totalW) / 2;
            const top = 70, hitY = H - 96;

            ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
            ctx.font = 'bold 22px Arial';
            ctx.fillText('🎵 노래노래 리듬게임', W / 2, 16);

            rg.buttons = [];
            // 닫기
            const cx = W - 44, cy = 16;
            ctx.fillStyle = '#c0392b'; ctx.fillRect(cx, cy, 28, 28);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Arial'; ctx.textBaseline = 'middle';
            ctx.fillText('✕', cx + 14, cy + 15);
            rg.buttons.push({ x: cx, y: cy, w: 28, h: 28, act: 'close' });

            // 레인
            for (let i = 0; i < 4; i++) {
                const lx = left + i * (laneW + gap);
                ctx.fillStyle = 'rgba(255,255,255,0.04)'; ctx.fillRect(lx, top, laneW, hitY - top);
                ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 2; ctx.strokeRect(lx, top, laneW, hitY - top);
                if (rg.flash[i] > 0) { ctx.save(); ctx.globalAlpha = 0.4 * rg.flash[i]; ctx.fillStyle = RG_COLORS[i]; ctx.fillRect(lx, top, laneW, hitY - top); ctx.restore(); }
            }
            // 판정선
            ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(left - 4, hitY); ctx.lineTo(left + totalW + 4, hitY); ctx.stroke();
            // 키 패드(클릭/터치 가능)
            for (let i = 0; i < 4; i++) {
                const lx = left + i * (laneW + gap);
                ctx.fillStyle = rg.flash[i] > 0 ? RG_COLORS[i] : 'rgba(0,0,0,0.55)';
                ctx.fillRect(lx, hitY + 6, laneW, 46);
                ctx.strokeStyle = RG_COLORS[i]; ctx.lineWidth = 2; ctx.strokeRect(lx, hitY + 6, laneW, 46);
                ctx.fillStyle = '#fff'; ctx.font = 'bold 26px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(RG_LABELS[i], lx + laneW / 2, hitY + 30);
                rg.buttons.push({ x: lx, y: hitY + 6, w: laneW, h: 46, act: 'lane', lane: i });
            }

            if (rg.state === 'play') {
                const now = rgSongTime();
                for (const n of rg.notes) {
                    if (n.hit || n.dead) continue;
                    const dt = n.time - now;
                    if (dt > RG_APPROACH || dt < -RG_GOOD) continue;
                    const ny = top + (hitY - top) * (1 - dt / RG_APPROACH);
                    const lx = left + n.lane * (laneW + gap);
                    ctx.fillStyle = RG_COLORS[n.lane];
                    ctx.fillRect(lx + 7, ny - 11, laneW - 14, 22);
                }
                ctx.fillStyle = '#fff'; ctx.textAlign = 'left'; ctx.textBaseline = 'top'; ctx.font = 'bold 18px Arial';
                ctx.fillText('점수 ' + rg.score.toLocaleString(), left, top - 36);
                ctx.textAlign = 'right'; ctx.fillText('최고 ' + rgBest.toLocaleString(), left + totalW, top - 36);
                if (rg.combo > 1) { ctx.textAlign = 'center'; ctx.fillStyle = '#ffd166'; ctx.font = 'bold 30px Arial'; ctx.fillText(rg.combo + ' COMBO', W / 2, top + 50); }
                if (rg.judgeT > 0) {
                    ctx.textAlign = 'center'; ctx.fillStyle = rg.judgeColor;
                    ctx.save(); ctx.globalAlpha = Math.max(0, rg.judgeT); ctx.font = 'bold 34px Arial';
                    ctx.fillText(rg.judge, W / 2, hitY - 110); ctx.restore();
                }
                const pr = Math.min(1, now / RG_SONG_LEN);
                ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fillRect(left, top - 12, totalW, 5);
                ctx.fillStyle = '#7CFC8A'; ctx.fillRect(left, top - 12, totalW * pr, 5);
            } else if (rg.state === 'intro' || rg.state === 'result') {
                const bw = 560, bh = 320, bx = (W - bw) / 2, by = (H - bh) / 2;
                ctx.fillStyle = 'rgba(20,16,40,0.97)'; ctx.fillRect(bx, by, bw, bh);
                ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 3; ctx.strokeRect(bx, by, bw, bh);
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                let ly = by + 36;
                const line = (t, c, f) => { ctx.fillStyle = c; ctx.font = f; if (t) ctx.fillText(t, W / 2, ly); ly += 28; };
                if (rg.state === 'intro') {
                    line('🎵 노래노래 리듬게임', '#ffd166', 'bold 26px Arial'); ly += 4;
                    line('방향키 ←↑↓→ 로 노트를 판정선에 맞춰 치세요!', '#fff', '15px Arial');
                    line('보유 음표  🎵 ' + game.musicNotes, '#ff9be3', 'bold 18px Arial');
                    line('최고 점수: ' + rgBest.toLocaleString(), '#fff', '15px Arial');
                    line(rhythmEventActive() ? '할 때마다 음표 획득! (이벤트 7/10까지)' : '이벤트 종료 — 점수 도전만 가능', '#aaa', '13px Arial');
                } else {
                    line('🎉 결과', '#ffd166', 'bold 26px Arial'); ly += 2;
                    line('점수 ' + rg.lastScore.toLocaleString() + (rg.lastScore >= rgBest ? '  (신기록!)' : ''), '#fff', 'bold 18px Arial');
                    line('PERFECT ' + rg.hits.perfect + '   GOOD ' + rg.hits.good + '   MISS ' + rg.hits.miss, '#fff', '14px Arial');
                    line('최대 콤보 ' + rg.maxCombo, '#fff', '14px Arial');
                    line('코인 +' + (rg.coinReward || 0).toLocaleString() + '🪙    음표 +🎵' + (rg.notesEarned || 0), '#ff9be3', 'bold 16px Arial');
                }
                // 버튼 2개
                const btnW = 200, btnH = 42, gapB = 16;
                const byb = by + bh - 60;
                rgBtn((W - btnW * 2 - gapB) / 2, byb, btnW, btnH, rg.state === 'intro' ? '▶ 시작하기' : '↻ 다시하기', '#7CFC8A', 'start', '#062');
                rgBtn((W - btnW * 2 - gapB) / 2 + btnW + gapB, byb, btnW, btnH, '🛒 한정상점', '#e84393', 'shop');
            } else if (rg.state === 'shop') {
                const bw = 620, bh = 380, bx = (W - bw) / 2, by = (H - bh) / 2;
                ctx.fillStyle = 'rgba(20,16,40,0.98)'; ctx.fillRect(bx, by, bw, bh);
                ctx.strokeStyle = '#e84393'; ctx.lineWidth = 3; ctx.strokeRect(bx, by, bw, bh);
                ctx.textAlign = 'center'; ctx.textBaseline = 'top';
                ctx.fillStyle = '#ff9be3'; ctx.font = 'bold 24px Arial';
                ctx.fillText('🛒 한정 상점', W / 2, by + 16);
                ctx.fillStyle = '#ffd166'; ctx.font = 'bold 16px Arial';
                ctx.fillText('보유 음표  🎵 ' + game.musicNotes, W / 2, by + 46);

                // 카드 2개
                const cardW = bw - 60, cardX = bx + 30;
                const drawCard = (cy2, title, desc1, desc2, cost, owned, act) => {
                    ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fillRect(cardX, cy2, cardW, 110);
                    ctx.strokeStyle = '#888'; ctx.lineWidth = 1; ctx.strokeRect(cardX, cy2, cardW, 110);
                    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 19px Arial'; ctx.fillText(title, cardX + 16, cy2 + 12);
                    ctx.fillStyle = '#cfe8ff'; ctx.font = '13px Arial';
                    ctx.fillText(desc1, cardX + 16, cy2 + 42);
                    ctx.fillStyle = '#aaa'; ctx.fillText(desc2, cardX + 16, cy2 + 62);
                    // 구매 버튼
                    const bW2 = 150, bH2 = 40, bX2 = cardX + cardW - bW2 - 14, bY2 = cy2 + 35;
                    if (owned) {
                        ctx.fillStyle = '#555'; ctx.fillRect(bX2, bY2, bW2, bH2);
                        ctx.fillStyle = '#bbb'; ctx.font = 'bold 15px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.fillText('구매 완료 ✔', bX2 + bW2 / 2, bY2 + bH2 / 2);
                    } else {
                        const ok = game.musicNotes >= cost;
                        ctx.fillStyle = ok ? '#27ae60' : '#7f3b3b'; ctx.fillRect(bX2, bY2, bW2, bH2);
                        ctx.fillStyle = '#fff'; ctx.font = 'bold 15px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.fillText('구매  🎵' + cost, bX2 + bW2 / 2, bY2 + bH2 / 2);
                        rg.buttons.push({ x: bX2, y: bY2, w: bW2, h: bH2, act });
                    }
                };
                drawCard(by + 78, '🎤 마이크 (무기)', '공격력 ' + MIKE_ATK + ' · 잠재 [음표공격 데미지 2배] 고정', '※ 잠재능력 재설정 불가 · 평생 1회만 구매', MIKE_COST, game.boughtMike, 'buyMike');
                drawCard(by + 198, '🎵 음표공격 (스킬) [T]', '데미지 300% · 사냥 중인 모든 적을 한 번에 타격', '※ 마이크 장착 시 데미지 2배 · 1회만 구매', NOTESKILL_COST, game.hasNoteSkill, 'buyNote');

                rgBtn(bx + bw / 2 - 90, by + bh - 50, 180, 38, '◀ 뒤로', '#555', 'back');
            }
        }

        // 시작
        updateLoadingOverlay();
        loadCharacter();
        initMonsters();
        gameLoop();
        showBurningEventBanner();
        initOnlineRank(); // 온라인 랭킹 (설정돼 있으면 연결, 아니면 무시)
        if (game.guildName) guildFetchInfo(game.guildName); // 길드 공유 강화 동기화
        // 저장된 이름이 있으면 적용, 없으면 이름 입력창 띄우기
        if (!applyPlayerName()) askPlayerName();
    </script>
</body>
