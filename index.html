<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> time way ai</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }

        .game-container {
            transform-origin: center center;
            position: relative;
            width: 1000px;
            height: 600px;
            background: #87ceeb;
            border: 5px solid #333;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.82);
            color: #fff;
            font: bold 28px Arial, sans-serif;
            letter-spacing: 0;
            z-index: 90;
            pointer-events: none;
        }

        canvas {
            display: block;
        }

        .ui {
            display: none;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 10;
        }

        .controls p {
            margin: 5px 0;
        }

        /* 볼륨 슬라이더 (메뉴 설정 탭에서만 표시) */
        #volSlider {
            position: absolute;
            display: none;
            height: 22px;
            z-index: 30;
            accent-color: #ffd700;
            cursor: pointer;
        }

        /* 이름 입력창 */
        #nameModal {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.65);
            z-index: 50;
        }
        #nameModal .box {
            background: rgba(15, 20, 40, 0.97);
            border: 3px solid #ffd700;
            border-radius: 12px;
            padding: 28px 32px;
            text-align: center;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        #nameModal h2 { color: #ffd700; margin-bottom: 6px; font-size: 22px; }
        #nameModal p { color: #b8c2d8; font-size: 13px; margin-bottom: 16px; }
        #nameInput {
            width: 240px; padding: 10px 12px; font-size: 16px;
            border-radius: 8px; border: 2px solid #8fb7ff; outline: none;
            text-align: center; margin-bottom: 16px;
        }
        #nameOk {
            display: block; width: 100%; padding: 10px;
            background: #ffd700; color: #1a1a2a; font-weight: bold; font-size: 16px;
            border: none; border-radius: 8px; cursor: pointer;
        }
        #nameOk:hover { background: #ffe34d; }

        /* ===== 턴제 PvP ===== */
        #pvpModal {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.72);
            z-index: 60;
            font-family: Arial, sans-serif;
        }
        #pvpBody {
            background: rgba(14, 18, 34, 0.98);
            border: 3px solid #ff6b6b;
            border-radius: 14px;
            padding: 22px 26px;
            width: 560px;
            max-width: 92%;
            color: #fff;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }
        #pvpBody h2 { color: #ff8a8a; margin: 0 0 4px; font-size: 22px; }
        #pvpBody .sub { color: #b8c2d8; font-size: 13px; margin-bottom: 16px; }
        .pvp-btn {
            display: inline-block; padding: 11px 16px; margin: 5px;
            background: #2b3450; color: #fff; font-weight: bold; font-size: 15px;
            border: 2px solid #4a5a82; border-radius: 9px; cursor: pointer;
        }
        .pvp-btn:hover:not(:disabled) { filter: brightness(1.25); }
        .pvp-btn.primary { background: #ff6b6b; border-color: #ff6b6b; color: #1a1020; }
        .pvp-btn.primary:hover { background: #ff8585; }
        .pvp-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .pvp-btn.skill { display: block; width: 100%; text-align: left; margin: 4px 0; }
        #pvpCodeInput {
            width: 150px; padding: 9px; font-size: 20px; letter-spacing: 6px;
            text-align: center; border-radius: 8px; border: 2px solid #8fb7ff;
            outline: none; margin: 6px;
        }
        .pvp-code-big { font-size: 40px; letter-spacing: 10px; color: #ffd700; font-weight: bold; margin: 8px 0; }
        .pvp-side { display: flex; justify-content: space-between; gap: 14px; margin: 10px 0; }
        .pvp-card { flex: 1; background: rgba(255,255,255,0.05); border-radius: 9px; padding: 8px 10px; }
        .pvp-card.me { border: 2px solid #5dade2; }
        .pvp-card.opp { border: 2px solid #e74c3c; }
        .pvp-card .pname { font-weight: bold; font-size: 15px; margin-bottom: 2px; }
        .pvp-card .pjob { font-size: 11px; color: #b8c2d8; margin-bottom: 6px; }
        .pvp-bar { height: 14px; border-radius: 7px; background: #222; overflow: hidden; margin: 3px 0; position: relative; }
        .pvp-bar > i { display: block; height: 100%; transition: width 0.3s; }
        .pvp-bar span { position: absolute; inset: 0; font-size: 10px; line-height: 14px; color: #fff; text-shadow: 0 0 2px #000; }
        .pvp-turn { font-size: 15px; font-weight: bold; margin: 8px 0; padding: 6px; border-radius: 8px; }
        .pvp-turn.mine { background: rgba(93,173,226,0.22); color: #aee3ff; }
        .pvp-turn.theirs { background: rgba(231,76,60,0.18); color: #ffb3ab; }
        .pvp-log { text-align: left; font-size: 12px; color: #cdd6ea; background: rgba(0,0,0,0.3);
            border-radius: 8px; padding: 8px 10px; margin-top: 10px; min-height: 70px; max-height: 100px; overflow-y: auto; }
        .pvp-log div { margin: 2px 0; }
        .pvp-actions { margin-top: 10px; }
        .pvp-close { position: absolute; top: 10px; right: 14px; font-size: 22px; color: #b8c2d8; cursor: pointer; }

        /* ===== 실시간 PvP 아레나 ===== */
        #pvpArena { background:#0d1426; border-radius:10px; display:block; margin:8px auto; border:2px solid #33415f; touch-action:none; }
        .pvp-hud { display:flex; justify-content:space-between; gap:10px; margin:2px 2px 0; }
        .pvp-hud .side { flex:1; text-align:left; }
        .pvp-hud .side.opp { text-align:right; }
        .pvp-hud .nm { font-size:12px; font-weight:bold; margin-bottom:2px; }
        .pvp-hint { font-size:11px; color:#8893ab; margin-top:8px; line-height:1.5; }
        .pvp-hint b { color:#cdd6ea; }

        /* ===== 채팅 (월드 / 길드 / 친구) ===== */
        #chatModal { position:absolute; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.55); z-index:61; font-family:Arial, sans-serif; }
        #chatBody { position:relative; background:rgba(14,18,34,0.98); border:3px solid #4aa3ff; border-radius:14px; width:380px; max-width:94%; height:480px; max-height:88%; padding:16px; display:flex; flex-direction:column; color:#fff; box-shadow:0 12px 40px rgba(0,0,0,0.5); }
        .chat-close { position:absolute; top:8px; right:12px; font-size:20px; color:#b8c2d8; cursor:pointer; }
        .chat-tabs { display:flex; gap:6px; margin:2px 24px 8px 0; }
        .chat-tab { flex:1; padding:8px 0; background:#222a3d; color:#cdd6ea; border:1px solid #3a4a6a; border-radius:8px; font-weight:bold; font-size:13px; cursor:pointer; }
        .chat-tab.on { background:#2b6cb0; color:#fff; border-color:#4aa3ff; }
        .chat-friend { display:flex; gap:6px; margin-bottom:6px; }
        .chat-friend input { flex:1; padding:7px; border-radius:7px; border:1px solid #4a5a82; background:#0e1424; color:#fff; outline:none; }
        .chat-msgs { flex:1; overflow-y:auto; background:rgba(0,0,0,0.3); border-radius:8px; padding:8px; font-size:13px; text-align:left; }
        .cm { margin:3px 0; color:#dfe6f4; word-break:break-word; }
        .cm b { color:#7fc0ff; }
        .cm.mine b { color:#ffd166; }
        .chat-empty { color:#7a86a0; text-align:center; padding:14px; font-size:12px; }
        .chat-input-row { display:flex; gap:6px; margin-top:8px; }
        .chat-input-row input { flex:1; padding:9px; border-radius:8px; border:2px solid #4aa3ff; background:#0e1424; color:#fff; outline:none; }
        .chat-send { padding:9px 14px; background:#2b6cb0; color:#fff; border:none; border-radius:8px; font-weight:bold; cursor:pointer; white-space:nowrap; }

        /* ===== 경매장 ===== */
        #aucModal { position:absolute; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.6); z-index:62; font-family:Arial, sans-serif; }
        #aucBody { position:relative; background:rgba(16,18,30,0.99); border:3px solid #f1c40f; border-radius:14px; width:520px; max-width:95%; height:520px; max-height:90%; padding:16px; display:flex; flex-direction:column; color:#fff; box-shadow:0 12px 40px rgba(0,0,0,0.5); }
        .auc-close { position:absolute; top:8px; right:12px; font-size:20px; color:#b8c2d8; cursor:pointer; }
        .auc-head { display:flex; align-items:center; gap:10px; margin:0 24px 8px 0; }
        .auc-head h2 { margin:0; font-size:19px; color:#ffd35b; }
        .auc-coins { margin-left:auto; font-size:13px; color:#ffd166; font-weight:bold; }
        .auc-tabs { display:flex; gap:6px; margin-bottom:8px; }
        .auc-tab { flex:1; padding:8px 0; background:#2a2a18; color:#e6dcb0; border:1px solid #5a4a1a; border-radius:8px; font-weight:bold; font-size:13px; cursor:pointer; }
        .auc-tab.on { background:#b8860b; color:#fff; border-color:#f1c40f; }
        .auc-list { flex:1; overflow-y:auto; background:rgba(0,0,0,0.3); border-radius:8px; padding:6px; }
        .auc-row { display:flex; align-items:center; gap:8px; padding:7px 8px; border-bottom:1px solid rgba(255,255,255,0.06); }
        .auc-row .nm { flex:1; font-size:13px; }
        .auc-row .pw { font-size:11px; color:#9fb0c4; }
        .auc-row .pr { font-size:13px; color:#ffd166; font-weight:bold; white-space:nowrap; }
        .auc-row.sel { background:rgba(241,196,15,0.16); border-radius:6px; }
        .auc-btn { padding:6px 12px; background:#b8860b; color:#fff; border:none; border-radius:7px; font-weight:bold; font-size:12px; cursor:pointer; white-space:nowrap; }
        .auc-btn.cancel { background:#7f8c8d; }
        .auc-empty { color:#7a86a0; text-align:center; padding:18px; font-size:12px; }
        .auc-sellbar { display:flex; gap:6px; margin-top:8px; align-items:center; }
        .auc-sellbar input { width:140px; padding:9px; border-radius:8px; border:2px solid #f1c40f; background:#0e1424; color:#fff; outline:none; }
        .auc-sellbar .lab { font-size:12px; color:#cdd6ea; flex:1; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        <div id="loadingOverlay" class="loading-overlay">로딩중입니다.</div>
        <div class="ui">
            <p><strong>캐릭터: <span id="charName">모험가</span></strong></p>
            <p id="posInfo">위치: (0, 0)</p>
            <p id="dirInfo">방향: 정지</p>
        </div>
        <audio id="bgm" loop preload="auto">
            <source src="./bgm.mp3" type="audio/mpeg">
        </audio>
        <input type="range" id="volSlider" min="0" max="100" value="35">
        <div id="nameModal">
            <div class="box">
                <h2>⚔️ 이름을 정하세요</h2>
                <p>게임에서 사용할 닉네임 (최대 10자)</p>
                <input id="nameInput" type="text" maxlength="10" placeholder="예: 용사123">
                <button id="nameOk">시작하기 ▶</button>
            </div>
        </div>
        <div id="pvpModal">
            <div id="pvpBody"><!-- JS로 렌더링 --></div>
        </div>
        <div id="chatModal">
            <div id="chatBody"><!-- JS로 렌더링 --></div>
        </div>
        <div id="aucModal">
            <div id="aucBody"><!-- JS로 렌더링 --></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // === 제작자 정보 (여기 값만 바꾸면 게임 내 '제작자' 화면이 바뀝니다) ===
        const CREATOR = {
            name: '안준하 (Ahn Junha)',
            github: 'stu6008-cell',
            year: '2026'
        };

        // === 공통 UI 스타일 (모든 메뉴 패널이 같은 색/폰트를 쓰도록 통일) ===
        const UI = {
            panelBg: 'rgba(15, 20, 40, 0.95)',
            panelBorder: '#ffd700',
            accent: '#ffd700',
            sub: '#8fb7ff',
            text: '#ffffff',
            dim: '#b8c2d8',
            titleFont: 'bold 22px Arial',
            headFont: 'bold 15px Arial',
            bodyFont: '14px Arial'
        };

        // 배경음악(BGM) — 요청대로 처음엔 '꺼진' 상태로 시작 (P 키 / 🔊 버튼 / 메뉴로 켜기)
        const bgm = document.getElementById('bgm');
        let bgmVolume = parseFloat(localStorage.getItem('bgmVolume'));
        if (isNaN(bgmVolume)) bgmVolume = 0.35;     // 저장된 볼륨 없으면 35%
        bgm.volume = bgmVolume;
        let bgmOn = false; // 시작 시 꺼짐
        // 첫 사용자 입력 때 재생 시작 (브라우저 자동재생 정책) — 켜져 있을 때만
        function startBgm() {
            if (bgmOn && bgm.paused) {
                bgm.play().catch(() => {});
            }
        }
        function toggleBgm() {
            bgmOn = !bgmOn;
            if (bgmOn) bgm.play().catch(() => {});
            else bgm.pause();
        }
        function setBgmVolume(v) {
            bgmVolume = Math.max(0, Math.min(1, v));
            bgm.volume = bgmVolume;
            localStorage.setItem('bgmVolume', String(bgmVolume));
        }
        function updateLoadingOverlay() {
            loadingOverlay.style.display = (!game.assetLoad.bgm || !game.assetLoad.character) ? 'flex' : 'none';
        }
        window.addEventListener('pointerdown', startBgm);
        window.addEventListener('keydown', startBgm);
        bgm.addEventListener('canplaythrough', () => {
            game.assetLoad.bgm = true;
            updateLoadingOverlay();
        }, { once: true });
        bgm.addEventListener('error', () => {
            game.assetLoad.bgm = true;
            updateLoadingOverlay();
        }, { once: true });

        // 볼륨 슬라이더 (메뉴 > 설정 탭에서 표시)
        const volSlider = document.getElementById('volSlider');
        volSlider.value = Math.round(bgmVolume * 100);
        volSlider.addEventListener('input', () => setBgmVolume(volSlider.value / 100));

        // 맵 설정
        const MAP = {
            width: 2000
        };

        // 게임 상태
        const game = {
            character: {
                x: 500,
                y: 300,
                width: 60,
                height: 80,
                speed: 3,
                frameIndex: 0,
                frameCounter: 0,
                frameDelay: 10,
                runMultiplier: 2,   // 달리기 속도 배수
                runFrameDelay: 6,   // 달리기 시 애니메이션 속도 (더 빠름)
                direction: 'idle',
                facing: 'right', // 마지막으로 바라본 방향 (정지 중에도 유지)
                isAttacking: false,
                attackCounter: 0,
                attackDuration: 20,
                images: {
                    left: [],
                    right: [],
                },
                stats: {
                    hp: 100,
                    maxHp: 100,
                    mana: 50,
                    maxMana: 50,
                    level: 1,
                    exp: 0,
                    maxExp: 100,
                    statPoints: 0,
                    attack: 20,
                    defense: 5,
                    spirit: 10
                },
                job: '마법사' // 전직 전 기본 직업: 마법사
            },
            monsters: [],
            monsterSpawnCounter: 0,
            monsterSpawnInterval: 120, // 2초마다 확인
            autoHunt: false,
            autoHuntCounter: 0,
            autoHuntInterval: 30, // 0.5초마다 자동 공격
            saveCounter: 0, // 진행 상황 자동 저장 카운터
            camera: {
                x: 0,
                y: 0
            },
            damageText: [],
            skillEffects: [],     // 스킬 시각 효과
            skillCooldowns: { q: 0, w: 0, e: 0, f: 0, r: 0 }, // 스킬별 쿨다운
            ultimateUnlocked: false, // 서버보스 30회 처치로 궁극기 해제
            serverBossKills: 0,      // 서버보스 처치 횟수
            totalKills: 0,           // 누적 몬스터 처치 (퀘스트용)
            bossKills: 0,            // 누적 사냥터 보스 처치 (퀘스트용)
            totalPulls: 0,           // 누적 장비 뽑기 횟수 (퀘스트용)
            totalStarforce: 0,       // 누적 장비 강화(스타포스) 시도 (퀘스트용)
            totalGemPulls: 0,        // 누적 보석 뽑기 횟수 (퀘스트용)
            questClaimed: [],        // 보상 받은 퀘스트 id 목록
            questPage: 0,            // 퀘스트 창 페이지
            showQuest: false,        // 퀘스트 창 열림
            questButtons: [],        // 퀘스트 창 클릭 버튼
            guildName: '',           // 가입한 길드 이름 ('' = 미가입)
            guildButtons: [],        // 길드 탭 클릭 버튼
            guildSubTab: 'info',     // 길드 탭 안의 서브탭: info|raid|upgrade|shop
            guildShopLevel: 0,       // 길드 상점 업그레이드 단계 (1:훈장/경험치, 2:혼/각성)
            awakened: false,         // 1차 각성 (공격력 2배 + 새 스킬)
            awakened2: false,        // 2차 각성 (2막50 클리어, 공격력 또 2배 + 더 강한 스킬 + 패시브3개)
            spiritTimer: 0,          // 자연 정령 남은 프레임 (소환 시 60초)
            spiritCooldown: 0,       // 정령 소환 스킬 쿨다운
            spiritAtkCounter: 0,     // 정령 공격 타이머
            spirit: { x: 0, y: 0 },  // 정령 위치
            guildUpgrade: { atk: 0, def: 0, hp: 0 }, // 코인으로 강화하는 길드 능력치 레벨
            raidActive: false,       // 길드전 진행 중
            raidTimer: 0,            // 길드전 남은 프레임
            raidDamage: 0,           // 이번 길드전 누적 데미지
            raidBest: 0,             // 최고 길드전 데미지(길드 기여점수)
            skillLevels: {},         // 스킬 강화 레벨 { q:1, r:1 }
            skillTabButtons: [],     // 스킬 탭 강화 버튼
            coins: 0,             // 보유 코인
            currentZone: 0,       // 현재 사냥터 인덱스
            maxUnlockedZone: 0,   // 해금된 마지막 사냥터
            boss: null,           // 현재 사냥터 보스 (없으면 null)
            serverBoss: null,     // 서버보스 (이벤트에서 소환)
            showMap: false,       // 맵(사냥터 이동) 창 열림
            mapButtons: [],
            showEvent: false,     // 이벤트 메뉴(스텟/상점/맵) 열림
            eventTab: null,       // 가운데에 띄울 탭: 'stat' | 'shop' | 'map' | null
            eventMenuButtons: [], // 이벤트 좌측 메뉴 버튼
            eventCloseButton: null, // 가운데 패널 닫기 버튼
            gemInv: {},           // 미장착 보석: gemInv[type][grade] = 개수
            equippedGems: [],     // 장착 보석 (최대 5): {type, grade}
            gemButtons: [],       // 보석 탭 버튼들
            gemPage: 0,           // 보유 보석 목록 페이지
            uiButtons: [],        // 화면 버튼 (보스/이벤트/상점)
            pvpOpen: false,       // 턴제 PvP 모달 열림

        ];
        const GEM_TYPE_MAP = {};
        GEM_TYPES.forEach(t => { GEM_TYPE_MAP[t.key] = t; });
        const GEM_START_GRADE = 9;   // 뽑으면 항상 9등급
        const GEM_MAX_GRADE = 1;     // 최고 등급 (숫자가 작을수록 강함)
        const GEM_MAX_EQUIP = 5;     // 최대 장착 수
        const GEM_GACHA_COST = 1000;  // 보석 1회 뽑기 코인 (기존 200에서 5배)
        const GEM_CD_CAP = 60;       // 스킬쿨 감소 최대 % (너무 0초가 되지 않게)
        function gemStrength(grade) { return GEM_START_GRADE + 1 - grade; } // 9등급→1, 1등급→9
        function gemColor(grade) {
            // 1등급(최강) → 9등급(최약) 색상
            const colors = ['#ff4081','#e040fb','#7c4dff','#448aff','#18ffff','#69f0ae','#eeff41','#ffab40','#bdbdbd'];
            return colors[grade - 1] || '#bdbdbd';
        }
        function gemEffectLabel(type, grade) {
            const val = gemStrength(grade) * GEM_TYPE_MAP[type].perStr;
            return (type === 'cooldown' ? '-' : '+') + val + '%';
        }

        // === 메이플스토리M 스타일 장비 뽑기 시스템 ===
        // 등급 (낮음 → 높음): 노멀 / 레어 / 에픽 / 유니크 / 레전더리
        // weight: 장비 뽑기 등급 확률 — 좋은 등급일수록 더 희귀하게 하향 조정
        // '신화'는 weight 0 → 장비 뽑기엔 안 나오고 펫 승급으로만 도달하는 펫 전용 최고 등급
        const RARITIES = [
            { name: '노멀',     color: '#9e9e9e', mult: 1.0,  weight: 68 },
            { name: '레어',     color: '#2196f3', mult: 1.7,  weight: 21 },
            { name: '에픽',     color: '#9c27b0', mult: 2.6,  weight: 8 },
            { name: '유니크',   color: '#ff9800', mult: 4.2,  weight: 2.5 },
            { name: '레전더리', color: '#4caf50', mult: 7.0,  weight: 0.5 },
            { name: '신화',     color: '#ffd700', mult: 11.0, weight: 0 }
        ];

        // 등급 안의 세부 단계 (분열) — 같은 노멀이라도 Ⅰ < Ⅱ < Ⅲ
        const SUB_TIERS = 3;
        const SUB_NAME = ['Ⅰ', 'Ⅱ', 'Ⅲ'];      // 표시용 (index 0~2)
        const SUB_MULT = [1.0, 1.28, 1.6];      // 단계별 스탯 배율
        const SUB_WEIGHT = [60, 30, 10];        // 단계 추첨 가중치 (낮을수록 흔함)

        // 세부 단계 추첨
        function rollSubTier() {
            const total = SUB_WEIGHT.reduce((s, w) => s + w, 0);
            let r = Math.random() * total;
            for (let i = 0; i < SUB_TIERS; i++) {
                r -= SUB_WEIGHT[i];
                if (r <= 0) return i;
            }
            return 0;
        }

        // 등급 + 세부 단계 이름 (예: "노멀 Ⅱ")
        function rarityLabel(it) {
            return `${RARITIES[it.rarity].name} ${SUB_NAME[it.sub || 0]}`;
        }

        // 장비 슬롯 8종 + 기본 스탯
        const ITEM_BASE = {
            weapon: { name: '무기', icon: '⚔️', atk: 25, def: 0 },
            hat:    { name: '모자', icon: '🎩', atk: 0,  def: 14 },
            top:    { name: '상의', icon: '👕', atk: 0,  def: 18 },
            bottom: { name: '하의', icon: '👖', atk: 0,  def: 16 },
            shoes:  { name: '신발', icon: '👟', atk: 4,  def: 10 },
            gloves: { name: '장갑', icon: '🧤', atk: 10, def: 4 },
            cape:   { name: '망토', icon: '🧣', atk: 8,  def: 8 },
            ring:   { name: '반지', icon: '💍', atk: 12, def: 2 }
        };
        const ITEM_CATS = ['weapon', 'hat', 'top', 'bottom', 'shoes', 'gloves', 'cape', 'ring'];

        // 뽑기 비용
        const GACHA_COST = { single: 1000, ten: 9000 }; // 장비 뽑기 — 10배

        // 인벤토리 / 강화 설정
        const BAG_MAX = 700;          // 가방 최대 칸
        const MAX_STAR = 15;          // 최대 스타포스 ★
        const STAR_PER = 0.08;        // ★당 스탯 +8%
        const PER_PAGE = 28;          // 인벤토리 페이지당 표시 수
        const UPG_MAX = 7;            // 주문서 최대 강화 횟수
        const UPG_STAT = 5;           // 주문서 1회당 +스탯
        const SCROLL_COST = 800;      // 주문서 가격 (코인) — 10배
        const CUBE_COST = 1500;       // 큐브 가격 (코인) — 10배
        function enhanceRate(star) { return Math.max(0.3, 1 - star * 0.05); } // 스타포스 성공 확률
        function starforceCost(star) { return 50 + star * star * 8; }         // 스타포스 코인 비용
        function dismantleValue(it) { return Math.round(RARITIES[it.rarity].mult * 30 + (it.star || 0) * 25 + (it.upg || 0) * 10); }

        // 잠재능력 옵션 풀 (장비에 추가 옵션 부여)
        const POTENTIAL_POOL = [
            { key: 'atkPct',   label: '공격력',         min: 3,  max: 12 },
            { key: 'defPct',   label: '방어력',         min: 3,  max: 12 },
            { key: 'bossPct',  label: '보스 공격력',    min: 10, max: 35 },
            { key: 'critRate', label: '크리티컬 확률',  min: 3,  max: 10 },
            { key: 'critDmg',  label: '크리티컬 데미지', min: 5,  max: 20 }
        ];
        function potentialLines(rarity) { return rarity >= 4 ? 3 : (rarity >= 2 ? 2 : 1); }
        function rollPotential(rarity) {
            const n = potentialLines(rarity);
            const lines = [];
            for (let i = 0; i < n; i++) {
                const o = POTENTIAL_POOL[Math.floor(Math.random() * POTENTIAL_POOL.length)];
                lines.push({ key: o.key, label: o.label, val: o.min + Math.floor(Math.random() * (o.max - o.min + 1)) });
            }
            return lines;
        }
        function potLabel(p) { return p.key === 'noteDmg' ? '음표공격 데미지 2배' : `${p.label} +${p.val}%`; }

        // 화면 안내 메시지 (캐릭터 위)
        function floatMsg(text, color) {
            game.damageText.push({ x: game.character.x, y: game.character.y - 60, text, alpha: 1, duration: 42, color: color || '#ffd700' });
        }

        // 가중치로 등급 추첨
        function rollRarity() {
            const total = RARITIES.reduce((s, r) => s + r.weight, 0);
            let r = Math.random() * total;
            for (let i = 0; i < RARITIES.length; i++) {
                r -= RARITIES[i].weight;
                if (r <= 0) return i;
            }
            return 0;
        }

        // 아이템 1개 생성
        function makeItem(cat, rarityIdx) {
            const base = ITEM_BASE[cat];
            const sub = rollSubTier();
            const mult = RARITIES[rarityIdx].mult * SUB_MULT[sub];
            const roll = 0.9 + Math.random() * 0.2; // ±10% 랜덤
            return {
                id: game.nextItemId++,
                cat,
                rarity: rarityIdx,
                sub,
                star: 0,           // 스타포스
                upg: 0,            // 주문서 강화 횟수
                potential: [],     // 잠재능력 옵션
                atk: Math.round(base.atk * mult * roll),
                def: Math.round(base.def * mult * roll)
            };
        }

        // 실제 스탯 (주문서 + 스타포스 포함)
        function itemAtk(it) { return Math.round((it.atk + (it.upg || 0) * UPG_STAT) * (1 + (it.star || 0) * STAR_PER)); }
        function itemDef(it) { return Math.round((it.def + (it.upg || 0) * UPG_STAT) * (1 + (it.star || 0) * STAR_PER)); }
        function itemPower(it) { return it ? itemAtk(it) + itemDef(it) : 0; }
        function getItemById(id) { return game.bag.find(i => i.id === id) || null; }

        // 한 번 뽑기 (minRarity 이상 보장 가능)
        function pullOnce(minRarity = 0) {
            const cat = ITEM_CATS[Math.floor(Math.random() * ITEM_CATS.length)];
            let rarity = rollRarity();
            if (rarity < minRarity) rarity = minRarity;
            return makeItem(cat, rarity);
        }

        // 가방에 추가 (가득 차면 장착 안 된 가장 약한 장비 자동 분해)
        function addToBag(item) {
            if (game.bag.length >= BAG_MAX) {
                const equippedIds = Object.values(game.equipped);
                let weakest = null;
                game.bag.forEach(i => {
                    if (equippedIds.includes(i.id)) return;
                    if (!weakest || itemPower(i) < itemPower(weakest)) weakest = i;
                });
                if (weakest) {
                    game.coins += dismantleValue(weakest);
                    game.bag = game.bag.filter(i => i.id !== weakest.id);
                }
            }
            game.bag.push(item);
        }

        // 더 강하면 자동 장착
        function autoEquipIfBetter(item) {
            const curId = game.equipped[item.cat];
            const cur = curId ? getItemById(curId) : null;
            if (!cur || itemPower(item) > itemPower(cur)) {
                game.equipped[item.cat] = item.id;
            }
        }

        // 장비 뽑기 실행 (count: 1 또는 10)
        function doPull(count) {
            const cost = count === 10 ? GACHA_COST.ten : GACHA_COST.single;
            if (game.coins < cost) { floatMsg('코인 부족!', '#ff6b6b'); return; }
            game.coins -= cost;

            const results = [];
            for (let i = 0; i < count; i++) {
                const guarantee = (count === 10 && i === count - 1 &&
                                   !results.some(r => r.rarity >= 1)) ? 1 : 0;
                const it = pullOnce(guarantee);
                addToBag(it);
                autoEquipIfBetter(it);
                results.push(it);
            }
            game.totalPulls = (game.totalPulls || 0) + count;
            game.selectedItemId = results.reduce((b, i) => itemPower(i) > itemPower(b) ? i : b, results[0]).id;
            game.bagPage = Math.max(0, Math.floor((game.bag.length - 1) / PER_PAGE)); // 새 장비 보이게 마지막 페이지
            saveProgress();
        }

        // 장착 (id로)
        function equipById(id) {
            const it = getItemById(id);
            if (!it) return;
            game.equipped[it.cat] = it.id;
            saveProgress();
        }

        // 주문서 구매 (코인 → 주문서 1개)
        function buyScroll() {
            if (game.coins < SCROLL_COST) { floatMsg('코인 부족!', '#ff6b6b'); return; }
            game.coins -= SCROLL_COST;
            game.scrolls++;
            floatMsg('📜 주문서 +1');
            saveProgress();
        }

        // 큐브 구매 (코인 → 큐브 1개)
        function buyCube() {
            if (game.coins < CUBE_COST) { floatMsg('코인 부족!', '#ff6b6b'); return; }
            game.coins -= CUBE_COST;
            game.cubes++;
            floatMsg('🔮 큐브 +1', '#b388ff');
            saveProgress();
        }

        // 주문서 강화 — 주문서 1개 소모, 능력치 증가 (최대 UPG_MAX회)
        function applyScroll(id) {
            const it = getItemById(id);
            if (!it) return;
            if ((it.upg || 0) >= UPG_MAX) { floatMsg('최대 주문서 강화!'); return; }
            if (game.scrolls < 1) { floatMsg('주문서 부족! (이벤트→상점)', '#ff6b6b'); return; }
            game.scrolls--;
            it.upg = (it.upg || 0) + 1;
            floatMsg(`📜 주문서 강화! (${it.upg}/${UPG_MAX})`);
            saveProgress();
        }

        // 스타포스 — 코인 소모, 성공 시 ★+1
        function starforce(id) {
            const it = getItemById(id);
            if (!it) return;
            if (it.star >= MAX_STAR) { floatMsg('최대 스타포스!'); return; }
            const cost = starforceCost(it.star);
            if (game.coins < cost) { floatMsg('코인 부족!', '#ff6b6b'); return; }
            game.coins -= cost;
            game.totalStarforce = (game.totalStarforce || 0) + 1;
            if (Math.random() < enhanceRate(it.star)) {
                it.star++;
                floatMsg(`⭐ 스타포스 성공! ★${it.star}`);
            } else {
                floatMsg('스타포스 실패…', '#ff6b6b');
            }
            saveProgress();
        }

        // 잠재능력 재설정 — 큐브 1개 소모, 옵션 재추첨
        function rerollPotential(id) {
            const it = getItemById(id);
            if (!it) return;
            if (it.special === 'mike') { floatMsg('🎤 마이크는 잠재능력을 바꿀 수 없어요', '#ff9be3'); return; }
            if (game.cubes < 1) { floatMsg('큐브 부족! (이벤트→상점)', '#ff6b6b'); return; }
            game.cubes--;
            it.potential = rollPotential(it.rarity);
            floatMsg('🔮 잠재능력 재설정!', '#b388ff');
            saveProgress();
        }

        // 분해 — 코인 획득 후 제거 (장착 중이면 해제)
        function dismantleItem(id) {
            const it = getItemById(id);
            if (!it) return;
            const val = dismantleValue(it);
            game.coins += val;
            if (game.equipped[it.cat] === it.id) game.equipped[it.cat] = null;
            game.bag = game.bag.filter(i => i.id !== it.id);
            if (game.selectedItemId === it.id) game.selectedItemId = null;
            floatMsg(`분해 +${val.toLocaleString()}🪙`);
            saveProgress();
        }

        // 전체 판매 — 장착 중이 아닌 모든 장비를 분해해서 코인으로
        function dismantleAll() {
            const equippedIds = Object.values(game.equipped);
            let total = 0, n = 0;
            game.bag = game.bag.filter(it => {
                if (equippedIds.includes(it.id)) return true; // 장착 중인 건 보존
                total += dismantleValue(it);
                n++;
                return false;
            });
            if (n === 0) { floatMsg('판매할 장비 없음', '#aaa'); return; }
            game.coins += total;
            if (game.selectedItemId && !game.bag.some(i => i.id === game.selectedItemId)) {
                game.selectedItemId = null;
            }
            floatMsg(`💰 전체 판매 ${n}개 +${total.toLocaleString()}🪙`, '#ffd700');
            saveProgress();
        }

        // 장착 장비의 능력치 합 (주문서 + 스타포스 포함)
        function getEquipBonus() {
            let attack = 0, defense = 0;
            ITEM_CATS.forEach(cat => {
                const it = game.equipped[cat] ? getItemById(game.equipped[cat]) : null;
                if (it) { attack += itemAtk(it); defense += itemDef(it); }
            });
            return { attack, defense };
        }

        // 장착 장비의 잠재능력 합
        function getPotentialBonus() {
            const b = { atkPct: 0, defPct: 0, bossPct: 0, critRate: 0, critDmg: 0 };
            ITEM_CATS.forEach(cat => {
                const it = game.equipped[cat] ? getItemById(game.equipped[cat]) : null;
                if (it && it.potential) it.potential.forEach(p => { if (b[p.key] !== undefined) b[p.key] += p.val; });
            });
            return b;
        }

        // 장비 + 잠재(공/방 %) 포함 실제 공격력 / 방어력
        function effAttack() {
            const p = getPotentialBonus();
            return Math.round((game.character.stats.attack + getEquipBonus().attack) * (1 + (p.atkPct + gemBonus('attack') + passiveBonus('atkPct') + petStatBonus() + homeBonus('atk') + guildBonus('atk') + awaken2Bonus('atkPct') + medalBonus() + medalAbilityBonus('atkPct')) / 100) * (game.awakened ? AWAKEN_ATK_MULT : 1) * (game.awakened2 ? AWAKEN_ATK_MULT : 1));
        }
        function effDefense() {
            const p = getPotentialBonus();
            return Math.round((game.character.stats.defense + getEquipBonus().defense) * (1 + (p.defPct + gemBonus('defense') + passiveBonus('defPct') + petStatBonus() + homeBonus('def') + guildBonus('def') + awaken2Bonus('defPct') + medalBonus() + medalAbilityBonus('defPct')) / 100));
        }

        // === 보석 헬퍼/로직 ===
        // 장착한 보석들의 같은 효과 합계 (%)
        function gemBonus(typeKey) {
            let sum = 0;
            game.equippedGems.forEach(g => {
                if (g.type === typeKey) sum += gemStrength(g.grade) * GEM_TYPE_MAP[typeKey].perStr;
            });
            return sum;
        }
        // 보석 포함 최대 체력
        function effMaxHp() {
            return Math.round(game.character.stats.maxHp * (1 + (gemBonus('hp') + homeBonus('hp') + guildBonus('hp') + medalAbilityBonus('hpPct')) / 100));
        }
        // === 길드 강화 (코인) — 마이홈처럼 레벨당 % 보너스 (atk/def/hp) ===
        const GUILD_UP_PCT = 6;       // 레벨당 +6%
        const GUILD_UP_BASE = 8000;   // 강화 기본 비용
        function guildBonus(stat) { return (game.guildUpgrade[stat] || 0) * GUILD_UP_PCT; }
        function guildUpgradeCost(stat) { return ((game.guildUpgrade[stat] || 0) + 1) * GUILD_UP_BASE; }
        // 길드 공유 강화: 서버에 레벨 +1 요청 → 성공 시 코인 차감(모든 길드원이 보너스 공유)
        let _guildUpgrading = false;
        function upgradeGuildStat(stat) {
            if (!game.guildName) { floatMsg('길드에 먼저 가입하세요', '#ff6b6b'); return; }
            if (_guildUpgrading) return;
            const cost = guildUpgradeCost(stat);
            if (game.coins < cost) { floatMsg('코인 부족!', '#ff6b6b'); return; }
            _guildUpgrading = true;
            guildPost({ guild: 'upgrade', name: game.guildName, stat }).then(res => {
                _guildUpgrading = false;
                if (res && res.ok) {
                    game.coins -= cost;
                    if (res.upgrades) game.guildUpgrade = { atk: res.upgrades.atk || 0, def: res.upgrades.def || 0, hp: res.upgrades.hp || 0 };
                    const label = { hp: '체력', atk: '공격력', def: '방어력' }[stat];
                    floatMsg(`🏰 길드 ${label} 강화 Lv.${game.guildUpgrade[stat]}! (길드 공유 +${guildBonus(stat)}%)`, '#ffd700');
                    saveProgress();
                } else floatMsg('강화 실패 (길드 확인)', '#ff6b6b');
            }).catch(() => { _guildUpgrading = false; floatMsg('서버 연결 실패', '#ff6b6b'); });
        }
        // 1000레벨마다 획득 경험치가 2배씩 누적 (1000→2배, 2000→4배, 3000→8배 …)
        const LEVEL_EXP_BOOST_FROM = 1000;
        function expGainMult() {
            return Math.pow(2, Math.floor(game.character.stats.level / LEVEL_EXP_BOOST_FROM));
        }
        function gemCount(type, grade) { return (game.gemInv[type] && game.gemInv[type][grade]) || 0; }
        function addGem(type, grade, n = 1) {
            if (!game.gemInv[type]) game.gemInv[type] = {};
            game.gemInv[type][grade] = (game.gemInv[type][grade] || 0) + n;
        }
        function removeGem(type, grade, n = 1) {
            if (!game.gemInv[type]) return;
            game.gemInv[type][grade] = Math.max(0, (game.gemInv[type][grade] || 0) - n);
        }
        // 코인으로 보석 뽑기 (전부 9등급)
        function pullGem(count) {
            const cost = GEM_GACHA_COST * count;
            if (game.coins < cost) { floatMsg('코인 부족!', '#ff6b6b'); return; }
            game.coins -= cost;
            for (let i = 0; i < count; i++) {
                const t = GEM_TYPES[Math.floor(Math.random() * GEM_TYPES.length)];
                addGem(t.key, GEM_START_GRADE, 1);
            }
            game.totalGemPulls = (game.totalGemPulls || 0) + count;
            floatMsg(`💎 보석 ${count}개 획득! (9등급)`, '#18ffff');
            saveProgress();
        }
        // 같은 보석 2개 → 한 등급 위로 합성
        function mergeGem(type, grade) {
            if (grade <= GEM_MAX_GRADE) { floatMsg('이미 최고 등급!', '#ffd700'); return; }
            if (gemCount(type, grade) < 2) { floatMsg('같은 보석 2개 필요!', '#ff6b6b'); return; }
            removeGem(type, grade, 2);
            addGem(type, grade - 1, 1);
            floatMsg(`💎 합성! ${grade}등급 → ${grade - 1}등급`, gemColor(grade - 1));
            saveProgress();
        }
        // 보석 장착 / 해제
        function equipGem(type, grade) {
            if (game.equippedGems.length >= GEM_MAX_EQUIP) { floatMsg('장착 칸 가득! (최대 5)', '#ff6b6b'); return; }
            if (gemCount(type, grade) < 1) return;
            removeGem(type, grade, 1);
            game.equippedGems.push({ type, grade });
            floatMsg('💎 보석 장착!', '#18ffff');
            saveProgress();
        }
        function unequipGem(index) {
            const g = game.equippedGems[index];
            if (!g) return;
            addGem(g.type, g.grade, 1);
            game.equippedGems.splice(index, 1);
            saveProgress();
        }
        // 사망 처리 — 코인 10% 잃고 풀피로 부활 (무적 중엔 무시 → 연쇄 사망 방지)
        function playerDie() {
            if (game.invuln > 0) return;
            const lost = Math.floor(game.coins * 0.1);
            game.coins -= lost;
            game.character.stats.hp = effMaxHp();
            game.character.stats.mana = game.character.stats.maxMana;
            game.invuln = 90; // 1.5초 무적
            game.deathMsg = 150;          // 사망 배너 2.5초
            game.deathLostCoins = lost;
            floatMsg(`💀 사망! 코인 -${lost.toLocaleString()} (10%)`, '#ff6b6b');
            saveProgress();
        }

        // 전투 보정: 보스 추가뎀 + 크리티컬 (raw 데미지 → 최종 데미지/크리 여부)
        function applyCombatMods(raw, target) {
            const p = getPotentialBonus();
            let dmg = raw;
            if (target && (target.isBoss || target.isServerBoss)) dmg *= (1 + (p.bossPct + passiveBonus('bossPct') + medalAbilityBonus('bossPct')) / 100);
            let crit = false;
            if (Math.random() * 100 < (5 + p.critRate + passiveBonus('critRate') + awaken2Bonus('critRate') + medalAbilityBonus('critRate'))) {
                crit = true;
                dmg *= (1.5 + (p.critDmg + passiveBonus('critDmg') + awaken2Bonus('critDmg') + medalAbilityBonus('critDmg')) / 100);
            }
            return { dmg: Math.max(1, Math.round(dmg)), crit };
        }

        // === 펫 시스템 ===
        // 펫 강화 (코인 소모)
        // 물약 구매
        function buyHpPotion() {
            if (game.coins < HP_POTION.cost) { floatMsg('코인 부족!', '#ff6b6b'); return; }
            game.coins -= HP_POTION.cost; game.hpPotions++;
            floatMsg('🧪 체력 물약 +1', '#ff6b6b'); saveProgress();
        }
        function buyMpPotion() {
            if (game.coins < MP_POTION.cost) { floatMsg('코인 부족!', '#ff6b6b'); return; }
            game.coins -= MP_POTION.cost; game.mpPotions++;
            floatMsg('🔷 마나 물약 +1', '#0099ff'); saveProgress();
        }
        // 물약 사용
        function useHpPotion() {
            const s = game.character.stats;
            if (game.hpPotions < 1) { floatMsg('체력 물약 없음!', '#ff6b6b'); return; }
            const cap = effMaxHp();
            if (s.hp >= cap) { floatMsg('체력 가득!', '#aaa'); return; }
            game.hpPotions--;
            const heal = Math.round(cap * HP_POTION.heal);
            s.hp = Math.min(cap, s.hp + heal);
            floatMsg(`🧪 +${heal.toLocaleString()} HP`, '#2ecc71');
        }
        function useMpPotion() {
            const s = game.character.stats;
            if (game.mpPotions < 1) { floatMsg('마나 물약 없음!', '#ff6b6b'); return; }
            if (s.mana >= s.maxMana) { floatMsg('마나 가득!', '#aaa'); return; }
            game.mpPotions--;
            const heal = Math.round(s.maxMana * MP_POTION.heal);
            s.mana = Math.min(s.maxMana, s.mana + heal);
            floatMsg(`🔷 +${heal.toLocaleString()} MP`, '#3498db');
        }

        // 펫 강화서 구매 (코인 → 펫 강화서 1개)
        function buyPetScroll() {
            if (game.coins < PET_SCROLL_COST) { floatMsg('코인 부족!', '#ff6b6b'); return; }
            game.coins -= PET_SCROLL_COST;
            game.petScrolls++;
            floatMsg('🦴 펫 강화서 +1', '#5dade2');
            saveProgress();
        }

        // 펫 강화/등급업 (펫 강화서 소모) — 한 버튼으로 상황에 맞게
        function petAction() {
            const pet = game.pet;
            // 최대 강화 전: 펫 강화서 1개로 강화
            if (pet.level < PET_MAX_LEVEL) {
                if (game.petScrolls < 1) { floatMsg('펫 강화서 부족! (이벤트→상점)', '#ff6b6b'); return; }
                game.petScrolls--;
                pet.level++;
                floatMsg(`🐲 펫 강화! +${pet.level}`, '#5dade2');
                saveProgress();
                return;
            }
            // 최대 강화 상태: 등급 업 (다음 등급 해금)
            if (pet.rarity >= RARITIES.length - 1) { floatMsg('이미 최고 등급!', '#ffd700'); return; }
            const cost = petPromoteCost();
            if (game.petScrolls < cost) { floatMsg(`펫 강화서 ${cost}개 필요!`, '#ff6b6b'); return; }
            game.petScrolls -= cost;
            pet.rarity++;
            pet.level = 0;
            floatMsg(`⭐ 펫 등급 상승 → ${RARITIES[pet.rarity].name}!`, RARITIES[pet.rarity].color);
            saveProgress();
        }

        // 펫 갱신: 추적 이동 + 자동 공격 + 체력/마나 회복
        function updatePet() {
            const pet = game.pet;
            const char = game.character;

            // 캐릭터 뒤쪽 위로 부드럽게 따라오기
            const targetX = char.x + (char.facing === 'right' ? -55 : 55);
            const targetY = char.y - 60;
            pet.x += (targetX - pet.x) * 0.12;
            pet.y += (targetY - pet.y) * 0.12;

            // 자동 공격
            pet.attackCounter++;
            if (pet.attackCounter >= petInterval()) {
                let closest = null, cd = Infinity;
                game.monsters.forEach(m => {
                    const d = Math.hypot(m.x - pet.x, m.y - pet.y);
                    if (d < PET_RANGE && d < cd) { closest = m; cd = d; }
                });
                if (closest) {
                    pet.attackCounter = 0;
                    const raw = effAttack() * petDamageRatio();
                    const r = applyCombatMods(raw, closest);
                    // 펫 공격 이펙트 (작은 파랑 원)
                    game.skillEffects.push({
                        x: closest.x, y: closest.y, radius: 0, maxRadius: 36,
                        duration: 14, maxDuration: 14, color: '#5dade2', type: 'single'
                    });
                    damageMonster(closest, r.dmg, r.crit ? '#ff5252' : '#5dade2', r.crit);
                }
            }

            // 체력/마나 자동 회복 (1초마다, 펫 강함 비례)
            pet.regenCounter++;
            if (pet.regenCounter >= 60) {
                pet.regenCounter = 0;
                const cap = effMaxHp();
                const hpHeal = Math.max(1, Math.round(cap * 0.02 * petPower()));
                const mpHeal = Math.max(1, Math.round(char.stats.maxMana * 0.03 * petPower()));
                if (char.stats.hp < cap) {
                    char.stats.hp = Math.min(cap, char.stats.hp + hpHeal);
                }
                if (char.stats.mana < char.stats.maxMana) {
                    char.stats.mana = Math.min(char.stats.maxMana, char.stats.mana + mpHeal);
                }
            }
        }

            const pet = game.pet;

            const screenY = pet.y;
            const r = RARITIES[pet.rarity];
            const bob = Math.sin(Date.now() / 300) * 4;

            // 등급 색 오라
            ctx.fillStyle = `rgba(${hexToRgb(r.color)}, 0.25)`;
            ctx.beginPath();
            ctx.arc(screenX, screenY + bob, 20, 0, Math.PI * 2);
            ctx.fill();

            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(PET_ICON, screenX, screenY + bob);

            // 등급 + 강화 표시
            ctx.fillStyle = r.color;
            ctx.font = 'bold 10px Arial';

        const SPIRIT_MANA = 1000;          // 마나 1000

            if (game.inTown || game.naming) return;
            if (!game.awakened2) { floatMsg('🌟 2차 각성 후에 정령을 소환할 수 있어요!', '#ff80ab'); return; }

            game.character.stats.mana -= SPIRIT_MANA;
            game.spiritTimer = SPIRIT_DURATION;
            game.spiritCooldown = SPIRIT_COOLDOWN;
            game.spirit.x = game.character.x;

        function updateSpirit() {
            if (game.spiritTimer <= 0) return;
            game.spiritTimer--;
            const char = game.character;
            const tx = char.x + (char.facing === 'right' ? 60 : -60);
            const ty = char.y - 50;
            game.spirit.x += (tx - game.spirit.x) * 0.12;
            game.spirit.y += (ty - game.spirit.y) * 0.12;
            game.spiritAtkCounter++;
            if (game.spiritAtkCounter >= SPIRIT_INTERVAL) {
                let closest = null, cd = Infinity;
                game.monsters.forEach(m => {
                    const d = Math.hypot(m.x - game.spirit.x, m.y - game.spirit.y);
                    if (d < SPIRIT_RANGE && d < cd) { closest = m; cd = d; }
                });
                if (closest) {
                    game.spiritAtkCounter = 0;
                    const r = applyCombatMods(effAttack() * SPIRIT_DMG_RATIO, closest);
                    game.skillEffects.push({ x: closest.x, y: closest.y, radius: 0, maxRadius: 46, duration: 16, maxDuration: 16, color: '#7CFC00', type: 'single' });

            }
